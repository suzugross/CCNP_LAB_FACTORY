lab:
  title: POC-EVPN
  description: '{"ccnp_lease":{"p64":"UE9DLUVWUE4=","nodes":{"SPINE":"10.1.10.20","LEAF1":"10.1.10.31","LEAF2":"10.1.10.32","H1":"10.1.10.33","H2":"10.1.10.34","H3":"10.1.10.35","EXT":"10.1.10.36"}}}'
  notes: |
    PoC lab (Claude 2026-07-13): BL-055 EVPN-VXLAN ファブリック 案A 検証
    - ★最重要: SPINE=IOL(iol-xe) を l2vpn evpn の RR にして NX-OS leaf と interop できるか
    - Symmetric IRB (L3VNI 50000 / vrf TENANT-A) + Distributed Anycast GW
    - Type-5 (LEAF2=border, EXT の 198.51.100.0/24 を redistribute static)
    - ARP suppression は day0 に入れずライブ投入で検証
    - アンダーレイ: SPINE-LEAF1 10.0.1.0/30, SPINE-LEAF2 10.0.2.0/30,
      Lo0 = SPINE 10.254.0.254/32, LEAF1 10.254.0.1/32, LEAF2 10.254.0.2/32 (OSPF area0)
    - オーバーレイ: VLAN100/VNI10100=172.16.100.0/24, VLAN200/VNI10200=172.16.200.0/24,
      L3VNI=VLAN500/VNI50000, anycast GW .1 / MAC 0000.2222.3333, iBGP AS65100 via SPINE RR
    - MGMT: SPINE=.20 LEAF1=.31 LEAF2=.32 H1=.33 H2=.34 H3=.35 EXT=.36 (10.1.10.0/26)
  version: 0.3.0
nodes:
- id: SPINE
  label: SPINE
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname SPINE
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.20 255.255.255.192
     no shutdown
    !
    interface Loopback0
     description RR loopback
     ip address 10.254.0.254 255.255.255.255
    !
    interface Ethernet0/0
     description === to LEAF1 Eth1/1 ===
     ip address 10.0.1.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/1
     description === to LEAF2 Eth1/1 ===
     ip address 10.0.2.1 255.255.255.252
     no shutdown
    !
    router ospf 1
     router-id 10.254.0.254
     network 10.0.1.0 0.0.0.3 area 0
     network 10.0.2.0 0.0.0.3 area 0
     network 10.254.0.254 0.0.0.0 area 0
    !
    router bgp 65100
     bgp router-id 10.254.0.254
     bgp log-neighbor-changes
     no bgp default ipv4-unicast
     neighbor 10.254.0.1 remote-as 65100
     neighbor 10.254.0.1 update-source Loopback0
     neighbor 10.254.0.2 remote-as 65100
     neighbor 10.254.0.2 update-source Loopback0
     address-family l2vpn evpn
      neighbor 10.254.0.1 activate
      neighbor 10.254.0.1 send-community both
      neighbor 10.254.0.1 route-reflector-client
      neighbor 10.254.0.2 activate
      neighbor 10.254.0.2 send-community both
      neighbor 10.254.0.2 route-reflector-client
     exit-address-family
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: 600
  y: -150
  tags: [routers]
  interfaces:
  - id: SPINE-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: SPINE-i1
    label: Ethernet0/1
    type: physical
    slot: 1
  - id: SPINE-i2
    label: Ethernet0/2
    type: physical
    slot: 2
  - id: SPINE-i3
    label: Ethernet0/3
    type: physical
    slot: 3
- id: LEAF1
  label: LEAF1
  node_definition: nxosv9000
  image_definition: nxosv9300-10-5-1-f
  configuration: |
    hostname LEAF1
    # workaround for booting to loader> prompt
    echo 'from cli import cli' > set_boot.py
    echo 'import json' >> set_boot.py
    echo 'import os' >> set_boot.py
    echo 'import time' >> set_boot.py
    echo 'bootimage = json.loads(cli("show version | json"))["nxos_file_name"]' >> set_boot.py
    echo 'set_boot = cli("conf t ; boot nxos {} ; no event manager applet BOOTCONFIG".format(bootimage))' >> set_boot.py
    echo 'i = 0' >> set_boot.py
    echo 'while i < 10:' >> set_boot.py
    echo '    try:' >> set_boot.py
    echo '        save_config = cli("copy running-config startup-config")' >> set_boot.py
    echo '        break' >> set_boot.py
    echo '    except Exception:' >> set_boot.py
    echo '        i += 1' >> set_boot.py
    echo '        time.sleep(1)' >> set_boot.py
    echo 'os.remove("/bootflash/set_boot.py")' >> set_boot.py
    event manager applet BOOTCONFIG
     event syslog pattern "Configured from vty"
     action 1.0 cli python bootflash:set_boot.py
    # minimum needed config to login
    no password strength-check
    username admin role network-admin
    username admin password cisco role network-admin
    username SUZUKI role network-admin
    username SUZUKI password CCNP role network-admin
    vrf context management
    interface mgmt0
      vrf member management
      ip address 10.1.10.31/26
      no shutdown
    feature ospf
    feature bgp
    feature interface-vlan
    feature vn-segment-vlan-based
    feature nv overlay
    feature fabric forwarding
    nv overlay evpn
    fabric forwarding anycast-gateway-mac 0000.2222.3333
    vlan 100
      vn-segment 10100
    vlan 200
      vn-segment 10200
    vlan 500
      vn-segment 50000
    vrf context TENANT-A
      vni 50000
      rd auto
      address-family ipv4 unicast
        route-target both auto
        route-target both auto evpn
    interface loopback0
      ip address 10.254.0.1/32
    router ospf UNDERLAY
      router-id 10.254.0.1
    interface Ethernet1/1
      no switchport
      ip address 10.0.1.2/30
      ip router ospf UNDERLAY area 0
      no shutdown
    interface loopback0
      ip router ospf UNDERLAY area 0
    interface Vlan100
      no shutdown
      vrf member TENANT-A
      ip address 172.16.100.1/24
      fabric forwarding mode anycast-gateway
    interface Vlan200
      no shutdown
      vrf member TENANT-A
      ip address 172.16.200.1/24
      fabric forwarding mode anycast-gateway
    interface Vlan500
      no shutdown
      vrf member TENANT-A
      ip forward
    router bgp 65100
      router-id 10.254.0.1
      neighbor 10.254.0.254
        remote-as 65100
        update-source loopback0
        address-family l2vpn evpn
          send-community
          send-community extended
      vrf TENANT-A
        address-family ipv4 unicast
          advertise l2vpn evpn
    evpn
      vni 10100 l2
        rd auto
        route-target import auto
        route-target export auto
      vni 10200 l2
        rd auto
        route-target import auto
        route-target export auto
    interface nve1
      no shutdown
      host-reachability protocol bgp
      source-interface loopback0
      member vni 10100
        ingress-replication protocol bgp
      member vni 10200
        ingress-replication protocol bgp
      member vni 50000 associate-vrf
    interface Ethernet1/2
      switchport
      switchport access vlan 100
      no shutdown
  x: 400
  y: 100
  tags: [switches]
  interfaces:
  - id: LEAF1-i0
    label: mgmt0
    type: physical
    slot: 0
  - id: LEAF1-i1
    label: Ethernet1/1
    type: physical
    slot: 1
  - id: LEAF1-i2
    label: Ethernet1/2
    type: physical
    slot: 2
  - id: LEAF1-i3
    label: Ethernet1/3
    type: physical
    slot: 3
