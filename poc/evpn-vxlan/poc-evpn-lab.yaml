      ip address 172.16.200.1/24
      fabric forwarding mode anycast-gateway
    interface Vlan500
      no shutdown
      vrf member TENANT-A
      ip forward
    ip prefix-list PL-EXT seq 5 permit 198.51.100.0/24
    route-map RM-EXT permit 10
      match ip address prefix-list PL-EXT
    router bgp 65100
      router-id 10.254.0.2
      neighbor 10.254.0.254
        remote-as 65100
        update-source loopback0
        address-family l2vpn evpn
          send-community
          send-community extended
      vrf TENANT-A
        address-family ipv4 unicast
          advertise l2vpn evpn
          redistribute static route-map RM-EXT
    evpn
      vni 10100 l2
        rd auto
        route-target import auto
        route-target export auto
      vni 10200 l2
        rd auto
        route-target import auto
        route-target export auto
    interface nve1
      no shutdown
      host-reachability protocol bgp
      source-interface loopback0
      member vni 10100
        ingress-replication protocol bgp
      member vni 10200
        ingress-replication protocol bgp
      member vni 50000 associate-vrf
    interface Ethernet1/2
      switchport
      switchport access vlan 100
      no shutdown
    interface Ethernet1/3
      switchport
      switchport access vlan 200
      no shutdown
    interface Ethernet1/4
      no switchport
      vrf member TENANT-A
      ip address 192.168.100.1/30
      no shutdown
