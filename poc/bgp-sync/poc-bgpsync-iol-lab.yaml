    label: Ethernet0/1
    type: physical
    slot: 1
- id: RT05
  label: RT05
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname RT05
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    interface Loopback1
     description === AS65200 顧客網 ===
     ip address 203.0.113.1 255.255.255.0
    !
    interface Ethernet0/0
     description === to RT04 (eBGP) ===
