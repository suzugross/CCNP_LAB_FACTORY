     no shutdown
    !
    interface Ethernet0/1
     description === to RT04 (OSPF core) ===
     ip address 10.0.34.3 255.255.255.0
     no shutdown
    !
    router ospf 1
     router-id 3.3.3.3
     network 3.3.3.3 0.0.0.0 area 0
     network 10.0.23.0 0.0.0.255 area 0
     network 10.0.34.0 0.0.0.255 area 0
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
  x: 0
  y: 0
  tags: [routers]
  interfaces:
  - id: RT03-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: RT03-i1
    label: Ethernet0/1
    type: physical
