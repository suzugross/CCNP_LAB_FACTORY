lab:
  title: POC-QOS-IOL
  description: '{"ccnp_lease":{"p64":"UE9DLVFPUw==","nodes":{"RT01":"10.1.10.14","RT02":"10.1.10.15","PC01":"10.1.10.16","PC02":"10.1.10.17"}}}'
  notes: |
    PoC lab (Claude 2026-07-08): BL-022 QoS 実効性マトリクス (IOL)
    - PC01(iperf3 client) -- RT01 --(bottleneck E0/1)-- RT02 -- PC02(iperf3 server)
    - in-band: 10.99.1.0/30 (PC01-RT01) / 10.99.12.0/30 (RT01-RT02) / 10.99.2.0/30 (RT02-PC02)
    - MGMT: RT01=.14 RT02=.15 PC01=.16 PC02=.17 (10.1.10.0/26, gw .30)
    検証: shape average / police / LLQ の実効を iperf3 + ping tos で測定
  version: 0.3.0
nodes:
- id: PC01
  label: PC01
  node_definition: ubuntu
  image_definition: ubuntu-24-04-20241004
  ram: 2048
  configuration:
  - name: user-data
    content: |
      #cloud-config
      hostname: PC01
      manage_etc_hosts: true
      system_info:
        default_user:
          name: suzuki
      password: CCNP
      chpasswd: { expire: false }
      ssh_pwauth: true
      package_update: true
      packages:
        - iperf3
      runcmd:
        - command -v iperf3 || (apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y iperf3)
        - date -Is > /var/tmp/poc_cloudinit_done
  - name: network-config
    content: |
      #network-config
      network:
        version: 2
        ethernets:
          ens2:
            addresses: [10.1.10.16/26]
            routes:
              - to: default
                via: 10.1.10.30
            nameservers:
              addresses: [8.8.8.8, 8.8.4.4]
          ens3:
            addresses: [10.99.1.2/30]
            routes:
              - to: 10.99.0.0/16
                via: 10.99.1.1
  x: -500
  y: -200
  tags: [servers]
  interfaces:
  - id: PC01-i0
    label: ens2
    type: physical
    slot: 0
  - id: PC01-i1
    label: ens3
    type: physical
    slot: 1
- id: PC02
  label: PC02
  node_definition: ubuntu
  image_definition: ubuntu-24-04-20241004
  ram: 2048
  configuration:
  - name: user-data
    content: |
      #cloud-config
      hostname: PC02
      manage_etc_hosts: true
      system_info:
        default_user:
          name: suzuki
      password: CCNP
      chpasswd: { expire: false }
      ssh_pwauth: true
      package_update: true
      packages:
        - iperf3
      runcmd:
        - command -v iperf3 || (apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y iperf3)
        - date -Is > /var/tmp/poc_cloudinit_done
  - name: network-config
    content: |
      #network-config
      network:
        version: 2
        ethernets:
          ens2:
            addresses: [10.1.10.17/26]
            routes:
              - to: default
                via: 10.1.10.30
            nameservers:
              addresses: [8.8.8.8, 8.8.4.4]
          ens3:
            addresses: [10.99.2.2/30]
            routes:
              - to: 10.99.0.0/16
                via: 10.99.2.1
  x: 300
  y: -200
  tags: [servers]
  interfaces:
  - id: PC02-i0
    label: ens2
    type: physical
    slot: 0
  - id: PC02-i1
    label: ens3
    type: physical
    slot: 1
- id: RT01
  label: RT01
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname RT01
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.14 255.255.255.192
     no shutdown
    !
    interface Ethernet0/0
     description === to PC01 ===
     ip address 10.99.1.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/1
     description === to RT02 (bottleneck) ===
     ip address 10.99.12.1 255.255.255.252
     no shutdown
    !
    ip route 10.99.2.0 255.255.255.252 10.99.12.2
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: -300
  y: -200
  tags: [routers]
  interfaces:
  - id: RT01-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: RT01-i1
    label: Ethernet0/1
    type: physical
    slot: 1
  - id: RT01-i3
    label: Ethernet0/3
    type: physical
    slot: 3
- id: RT02
  label: RT02
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname RT02
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.15 255.255.255.192
     no shutdown
    !
    interface Ethernet0/0
     description === to PC02 ===
     ip address 10.99.2.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/1
     description === to RT01 (bottleneck) ===
     ip address 10.99.12.2 255.255.255.252
     no shutdown
    !
    ip route 10.99.1.0 255.255.255.252 10.99.12.1
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: 100
  y: -200
  tags: [routers]
  interfaces:
