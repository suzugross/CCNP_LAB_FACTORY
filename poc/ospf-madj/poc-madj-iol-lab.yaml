lab:
  title: POC-OSPF-MADJ
  description: '{"ccnp_lease":{"p64":"UE9DLU9TUEYtTUFESg==","nodes":{"RT01":"10.1.10.14","RT02":"10.1.10.15","RT03":"10.1.10.16","RT04":"10.1.10.17"}}}'
  notes: |
    PoC lab (Claude 2026-07-09): BL-028 OSPF マルチエリア隣接 (RFC 5185) 実効性検証 (IOL)
    - RT01(ABR西, Lo0=area1) =直結 area100(cost10)= RT02(ABR東, Lo0=area2)
    - 迂回路: RT01 -[area0 cost100]- RT03 -[cost100]- RT04 -[cost100]- RT02
    - 初期: RT01→2.2.2.2 は area0 チェーン経由(O IA, RFC3509)。
      検証= ip ospf multi-area 0 投入で直結へ切替わるか / P2P限定制約 / Genie OSPF_MA0
    - MGMT: RT01=.14 RT02=.15 RT03=.16 RT04=.17 (10.1.10.0/26, gw .30)
  version: 0.3.0
nodes:
- id: RT01
  label: RT01
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname RT01
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.14 255.255.255.192
     no shutdown
    !
    interface Loopback0
     description === leaf endpoint (area 1) ===
     ip address 1.1.1.1 255.255.255.255
    !
    interface Loopback100
     description === area100 監視Lo ===
     ip address 172.31.100.1 255.255.255.255
    !
    interface Ethernet0/0
     description === to RT02 直結 (area 100, cost 10) ===
     ip address 10.1.12.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/1
     description === to RT03 (area 0, cost 100) ===
     ip address 10.1.13.1 255.255.255.252
     ip ospf cost 100
     no shutdown
    !
    router ospf 1
     router-id 1.1.1.1
     network 1.1.1.1 0.0.0.0 area 1
     network 172.31.100.1 0.0.0.0 area 100
     network 10.1.12.0 0.0.0.3 area 100
     network 10.1.13.0 0.0.0.3 area 0
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: -300
  y: 0
  tags: [routers]
  interfaces:
  - id: RT01-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: RT01-i1
    label: Ethernet0/1
    type: physical
    slot: 1
  - id: RT01-i3
    label: Ethernet0/3
    type: physical
    slot: 3
