lab:
  title: POC-DHCPV6
  description: '{"ccnp_lease":{"p64":"UE9DLURIQ1BWNg==","nodes":{"RT01":"10.1.10.14","RT02":"10.1.10.15","CLA":"10.1.10.16","CLB":"10.1.10.17"}}}'
  notes: |
    PoC lab (Claude 2026-07-09): BL-034 DHCPv6 実効性検証 (IOL)
    - RT01=DHCPv6サーバ / RT02=GW+リレー / CLA=stateless(SLAAC+O-flag) / CLB=stateful(M-flag)
    - DHCPv6/RA フラグ設定は day0 に入れず、プローブで SSH から順次投入して挙動を観測する
    - アドレッシング: RT01-RT02=2001:DB8:12::/64, LAN-A=2001:DB8:A::/64, LAN-B=2001:DB8:B::/64
    - MGMT: RT01=.14 RT02=.15 CLA=.16 CLB=.17 (10.1.10.0/26, gw .30)
  version: 0.3.0
nodes:
- id: RT01
  label: RT01
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname RT01
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    ipv6 unicast-routing
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.14 255.255.255.192
     no shutdown
    !
    interface Loopback0
     ipv6 address 2001:DB8:1::1/128
    !
    interface Ethernet0/0
     description === to RT02 ===
     ipv6 address 2001:DB8:12::1/64
     no shutdown
    !
    ipv6 route 2001:DB8:A::/64 2001:DB8:12::2
    ipv6 route 2001:DB8:B::/64 2001:DB8:12::2
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: 0
  y: -300
  tags: [routers]
  interfaces:
  - id: RT01-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: RT01-i3
    label: Ethernet0/3
    type: physical
    slot: 3
- id: RT02
  label: RT02
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname RT02
    !
