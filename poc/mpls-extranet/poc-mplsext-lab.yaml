  i1: PE2-i3
  n2: MGMTSW
  i2: MGMTSW-i1
  conditioning: {}
  label: PE2-mgmt
- id: l3
  n1: MGMTSW
  i1: MGMTSW-i2
  n2: EXTC
  i2: EXTC-i0
  conditioning: {}
  label: mgmt-uplink
annotations: []
