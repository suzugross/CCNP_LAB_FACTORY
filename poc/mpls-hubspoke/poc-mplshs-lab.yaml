lab:
  title: POC-MPLSHS
  description: '{"ccnp_lease":{"p64":"UE9DLU1QTFNIUw==","nodes":{"PE1":"10.1.10.20","PE2":"10.1.10.31","PE3":"10.1.10.32","CEH":"10.1.10.33","CES1":"10.1.10.34","CES2":"10.1.10.35"}}}'
  notes: |
    PoC lab (Claude 2026-07-12): BL-016 フルメッシュ×ハブ&スポーク組み分け — hub CE 折返し検証 (IOL)
    - 最小6台: PE1(hub)/PE2/PE3 + CEH/CES1/CES2。sdwan-poc(9ノード)と共存のため12台でなく6台。
    - H&S 非対称 RT は day0 に焼き込み済 (hub: exp 210/imp 220, spoke: exp 220/imp 210)。
    - PoC-0: spoke↔hub 疎通 / spoke↔spoke 不通 (RT 設計自体の検証)
    - PoC-1: 単一セッション折返し (CE-H が同一 eBGP セッションへ再広告するか + PE1 allowas-in)
    - PoC-2: (PoC-1 不発時) PE1-CEH を dot1q subif 2本に割り 2VRF half-duplex 折返し
    - アドレス: コア 10.0.12/13.0/30, Lo0 10.255.0.x/32, PE-CE 192.168.1-3.0/30, CE LAN 172.16.1-3.0/24(Lo1)
    - AS: SP=65000, CEH=65201, CES1=65202, CES2=65203 (サイト毎AS基礎形・as-override 非関与)
    - MGMT: PE1=.20 PE2=.31 PE3=.32 CEH=.33 CES1=.34 CES2=.35 (10.1.10.0/26)
  version: 0.3.0
nodes:
- id: PE1
  label: PE1
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname PE1
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    vrf definition CUST_B
     rd 65000:201
     address-family ipv4
      route-target export 65000:210
      route-target import 65000:220
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.20 255.255.255.192
     no shutdown
    !
    interface Loopback0
     ip address 10.255.0.1 255.255.255.255
    !
    interface Ethernet0/0
     description === to PE2 (core) ===
     ip address 10.0.12.1 255.255.255.252
     mpls ip
     no shutdown
    !
    interface Ethernet0/1
     description === to PE3 (core) ===
     ip address 10.0.13.1 255.255.255.252
     mpls ip
     no shutdown
    !
    interface Ethernet0/2
     description === to CEH (hub site) ===
     vrf forwarding CUST_B
     ip address 192.168.1.1 255.255.255.252
     no shutdown
    !
    mpls ldp router-id Loopback0 force
    !
    router ospf 1
     router-id 10.255.0.1
     network 10.0.12.0 0.0.0.3 area 0
     network 10.0.13.0 0.0.0.3 area 0
     network 10.255.0.1 0.0.0.0 area 0
    !
    router bgp 65000
     bgp router-id 10.255.0.1
     bgp log-neighbor-changes
     no bgp default ipv4-unicast
     neighbor 10.255.0.2 remote-as 65000
     neighbor 10.255.0.2 update-source Loopback0
     neighbor 10.255.0.3 remote-as 65000
     neighbor 10.255.0.3 update-source Loopback0
     address-family vpnv4
      neighbor 10.255.0.2 activate
      neighbor 10.255.0.2 send-community extended
      neighbor 10.255.0.3 activate
      neighbor 10.255.0.3 send-community extended
     exit-address-family
     address-family ipv4 vrf CUST_B
      neighbor 192.168.1.2 remote-as 65201
      neighbor 192.168.1.2 activate
      neighbor 192.168.1.2 soft-reconfiguration inbound
     exit-address-family
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: 0
  y: 0
  tags: [routers]
  interfaces:
  - id: PE1-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: PE1-i1
    label: Ethernet0/1
    type: physical
    slot: 1
  - id: PE1-i2
