lab:
  title: POC-UM2-ONEARM
  description: BL-042 UM2 one-arm VRF/HSRP/FW-HA golden probe (console-only)
  notes: "UM2 ワンアームLB変種の golden（UM2-BUILD-02 模範解答の正準）。\n- LB=腕1本(Gi0/0)に dot1q 254(上流)/251(下流) 多重・SRV-SW無し・DMZ-SV=L3SW2 Gi1/0(access 251)\n- ★ワンアーム形はLB相互トラッキング不要: 腕断で上下サブIFが同時消滅し HSRP が揃って移る\n  (インライン形=poc-um2-lab.yaml は上下IF独立のため IP SLA 相互トラッキング必須・対比が教材)\n- 元は 2026-07-11 実機検証済プロトタイプ(二段NAT貫通・LB切替10/10無損失)の完全復元\n- FW config は yaml が正準"
  version: 0.3.0
