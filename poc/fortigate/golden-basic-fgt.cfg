# FGT-FW-BASIC-01 模範解答 (FortiOS 7.6.3 / eval 3IF)
# 前提: port3 (LAN兼管理 10.1.10.11/24) は据付済み。SD-WAN 設定は unbuild 済み。
# 投入は fgtbasic_ops.py solve (console 1行ずつ)。

# --- Phase 1: インターフェース設計 ------------------------------
config system interface
edit port1
set ip 203.0.113.2 255.255.255.252
set alias WAN
set role wan
unset allowaccess
next
edit port2
set ip 172.16.10.1 255.255.255.0
set alias DMZ
set role dmz
set allowaccess ping
next
end

# --- Phase 2: オブジェクト ---------------------------------------
config firewall address
edit LAN-NET
set subnet 10.1.10.0 255.255.255.0
next
edit DMZ-SRV
set subnet 172.16.10.10 255.255.255.255
next
end

# --- Phase 3: アウトバウンド (静的ルート + LAN→WAN + SNAT) -------
config router static
edit 1
set gateway 203.0.113.1
set device port1
next
end
config firewall policy
edit 1
set name LAN-to-WAN
set srcintf port3
set dstintf port1
set srcaddr LAN-NET
set dstaddr all
set schedule always
set service ALL
set action accept
set nat enable
set logtraffic all
next
end

# --- Phase 4: 公開サーバ (VIP=port1のIPでポート公開 + ポリシー) ---
config firewall vip
edit DMZ-SRV-HTTP
set extintf port1
set extip 203.0.113.2
set portforward enable
set extport 80
set mappedip 172.16.10.10
set mappedport 80
next
end
config firewall policy
edit 2
set name WAN-to-DMZ-HTTP
set srcintf port1
set dstintf port2
set srcaddr all
set dstaddr DMZ-SRV-HTTP
set schedule always
set service HTTP
set action accept
set logtraffic all
next
edit 3
set name LAN-to-DMZ
set srcintf port3
set dstintf port2
set srcaddr LAN-NET
set dstaddr DMZ-SRV
set schedule always
set service HTTP PING
set action accept
set logtraffic all
next
end
