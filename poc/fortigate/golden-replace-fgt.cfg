# FGT-REPLACE-01 模範解答 (FortiOS 7.6.3 / eval 3IF / BL-049)
# 前提: port3 (LAN兼管理 10.1.10.11/24) は据付済み。build で共用リセット済み。
# 投入は fgtreplace_ops.py solve (console 1行ずつ)。
# PoC 実機検証 2026-07-12: オフサブネット VIP 2.2.2.1 / ippool 2.2.2.10 とも
# session テーブルで dnat/snat 実証済 (ISP1 に 2.2.2.0/28 → 203.0.113.2 静的経路)。

# --- Phase 3-1: インターフェース (ワンアーム3サブIF → 3物理IF 再設計) ----
config system interface
edit port1
set mode static
set ip 203.0.113.2 255.255.255.252
set alias WAN
set role wan
unset allowaccess
next
edit port2
set ip 172.16.10.1 255.255.255.0
set alias DMZ
set role dmz
set allowaccess ping
next
end

# --- Phase 3-2: ルート (ASA の4本 → connected 化で default 1本のみ) -------
config router static
edit 1
set gateway 203.0.113.1
set device port1
next
end

# --- Phase 3-3: オブジェクト ---------------------------------------------
config firewall address
edit LAN-NET
set subnet 10.1.10.0 255.255.255.0
next
edit DMZ-SRV
set subnet 172.16.10.10 255.255.255.255
next
end

# --- Phase 3-4: NAT 部品 (ASA global+nat → ippool / static → VIP) --------
# ippool = ASA の OBJ-PAT-ADDR (PAT アドレス 2.2.2.10) に相当
config firewall ippool
edit SNAT-POOL
set startip 2.2.2.10
set endip 2.2.2.10
next
end
# VIP = ASA の object NAT static 172.16.250.1⇔2.2.2.1 に相当。
# ★port-forward ではなく 1:1 (全プロトコル) — ASA static と等価にするのが要点
#   (ICMP も通す要件があるため。extip はオフサブネットで可 = ISP1 が経路を持つ)
config firewall vip
edit SRV-VIP
set extintf port1
set extip 2.2.2.1
set mappedip 172.16.10.10
next
end

# --- Phase 3-5: ポリシー3本 (eval 上限ぴったり) ---------------------------
# 1: inside→outside PAT (ASA: nat dynamic + SL100→0 暗黙許可 の明示化)
# 2: outside→dmz 公開 (ASA: ACL OUTSIDE-IN icmp+www → dst は VIP オブジェクト)
# 3: inside→dmz (ASA: SL100→50 暗黙許可 の明示化 — 移行漏れの定番)
config firewall policy
edit 1
set name LAN-to-WAN
set srcintf port3
set dstintf port1
set srcaddr LAN-NET
set dstaddr all
set schedule always
set service ALL
set action accept
set nat enable
set ippool enable
set poolname SNAT-POOL
next
edit 2
set name WAN-to-DMZ-VIP
set srcintf port1
set dstintf port2
set srcaddr all
set dstaddr SRV-VIP
set schedule always
set service HTTP PING
set action accept
next
edit 3
set name LAN-to-DMZ
set srcintf port3
set dstintf port2
set srcaddr LAN-NET
set dstaddr DMZ-SRV
set schedule always
set service ALL
set action accept
next
end
