# FGT-SDWAN-01 模範解答 (FortiOS 7.6.3 実機検証済 2026-07-11)
# sdwan_ops.py solve がこのまま console 投入する。# 行と空行はスキップ。
# ★port3(LAN兼管理 10.1.10.11)は据付扱いのため含めない
config system interface
edit port1
set mode static
set ip 203.0.113.2 255.255.255.252
set allowaccess ping
next
edit port2
set mode static
set ip 203.0.114.2 255.255.255.252
set allowaccess ping
next
end
config system sdwan
set status enable
config members
edit 1
set interface port1
set gateway 203.0.113.1
next
edit 2
set interface port2
set gateway 203.0.114.1
next
end
config health-check
edit SLASRV
set server 198.51.100.100
set protocol ping
set interval 1000
set members 1 2
config sla
edit 1
set link-cost-factor latency packet-loss
set latency-threshold 100
set packetloss-threshold 5
next
end
next
end
config service
edit 1
set name TOSRV
set mode sla
set dst all
set src all
config sla
edit SLASRV
set id 1
next
end
set priority-members 1 2
next
end
end
config router static
edit 1
set sdwan-zone virtual-wan-link
next
end
config firewall policy
edit 1
set name LAN-TO-SDWAN
set srcintf port3
set dstintf virtual-wan-link
set srcaddr all
set dstaddr all
set action accept
set schedule always
set service ALL
set nat enable
next
end
