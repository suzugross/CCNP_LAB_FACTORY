! FGT-IPSEC-01 模範解答: RBR (Cisco IOSv 15.9) 側 — sVTI × IKEv2
! 前提: WAN(Gi0/0 198.51.101.2/30)/LAN(Gi0/1 192.168.20.1/24)/default route は据付。
! ★対向 FGT eval が DES 限定(LENC)のため des/sha256/group14 で統一。
! 投入は fgtipsec_ops.py solve (console・conf t 済み前提の行リスト)。
configure terminal
crypto ikev2 proposal FGT-PROP
 encryption des
 integrity sha256
 group 14
exit
crypto ikev2 policy FGT-POL
 proposal FGT-PROP
exit
crypto ikev2 keyring FGT-KR
 peer FGT
 address 203.0.113.2
 pre-shared-key Ccnp2026Ipsec
exit
exit
crypto ikev2 profile FGT-PROF
 match identity remote address 203.0.113.2 255.255.255.255
 authentication remote pre-share
 authentication local pre-share
 keyring local FGT-KR
exit
crypto ipsec transform-set TS-DES esp-des esp-sha256-hmac
 mode tunnel
exit
crypto ipsec profile IPSEC-PROF
 set transform-set TS-DES
 set pfs group14
 set ikev2-profile FGT-PROF
exit
interface Tunnel0
 ip address 172.16.255.2 255.255.255.252
 tunnel source GigabitEthernet0/0
 tunnel destination 203.0.113.2
 tunnel mode ipsec ipv4
 tunnel protection ipsec profile IPSEC-PROF
exit
ip route 10.1.10.0 255.255.255.0 Tunnel0
end
write memory
