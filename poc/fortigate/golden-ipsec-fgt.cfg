# FGT-IPSEC-01 模範解答: FGT 側 (FortiOS 7.6.3 / eval)
# 前提: build が port1(203.0.113.2/30)+デフォルトルートを据付済み。
#       ★port3(LAN兼管理)は据付されない(Phase 0 で受講者が自己設定・2026-07-23 課題化)。
# ★eval は LENC(低暗号)ビルド = 暗号は DES 系のみ / FWポリシー最大3本。
# 投入は fgtipsec_ops.py solve (console 1行ずつ)。

# --- Phase 0 (LAN兼管理 port3 の自己設定 = GUI の足場) --------------
config system interface
edit port3
set ip 10.1.10.11 255.255.255.0
set allowaccess ping https ssh http
set alias LAN-MGMT
set role lan
next
end

# --- Phase 1 (IKE SA) ---------------------------------------------
config vpn ipsec phase1-interface
edit TO-RBR
set interface port1
set ike-version 2
set remote-gw 198.51.101.2
set proposal des-sha256
set dhgrp 14
set psksecret Ccnp2026Ipsec
next
end

# --- Phase 2 (CHILD SA / セレクタは既定 0.0.0.0/0 = sVTI と噛み合う) ---
config vpn ipsec phase2-interface
edit TO-RBR-P2
set phase1name TO-RBR
set proposal des-sha256
set dhgrp 14
next
end

# --- トンネル IF の IP (phase1 作成で自動生成された TO-RBR に付与) ---
config system interface
edit TO-RBR
set ip 172.16.255.1 255.255.255.255
set remote-ip 172.16.255.2 255.255.255.252
set allowaccess ping
next
end

# --- オブジェクト・経路 -------------------------------------------
config firewall address
edit LAN-NET
set subnet 10.1.10.0 255.255.255.0
next
edit BR-NET
set subnet 192.168.20.0 255.255.255.0
next
end
config router static
edit 11
set dst 192.168.20.0 255.255.255.0
set device TO-RBR
next
end

# --- ポリシー (★これが無いと FGT は IKE ネゴ自体を拒否する) --------
config firewall policy
edit 1
set name LAN-to-VPN
set srcintf port3
set dstintf TO-RBR
set srcaddr LAN-NET
set dstaddr BR-NET
set schedule always
set service ALL
set action accept
next
edit 2
set name VPN-to-LAN
set srcintf TO-RBR
set dstintf port3
set srcaddr BR-NET
set dstaddr LAN-NET
set schedule always
set service ALL
set action accept
next
end
