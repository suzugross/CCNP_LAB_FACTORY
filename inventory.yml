---
# ノード名のグループ定義のみ。MGMTアドレスは固定せず、問題ごとに
# topologies/_generated/<problem>/mgmt_map.yml で .11-.20/.31-.50 を動的割当する
# （IPaddressRange: 全CMLノードのMGMTは 10.1.10.11-20 と .31-.50 の計30個が全範囲）。
# 接続認証は group_vars/all/vault.yml、role判定は名前接頭辞(RT/SW)。
all:
  children:
    routers:
      hosts:
        RT01: {}
        RT02: {}
        RT03: {}
        RT04: {}
        RT05: {}
        RT06: {}
        RT07: {}
        RT08: {}
        RT09: {}
        RT10: {}
    # Linux サーバ(ZBX=Zabbix監視, SRV=汎用, PC=クライアント端末)。接続は group_vars/servers.yml。
    servers:
      hosts:
        ZBX01: {}
        SRV01: {}
        SRV02: {}
        PC01: {}
        PC02: {}
    switches:
      hosts:
        SW01: {}
        SW02: {}
        SW03: {}
        SW04: {}
        SW05: {}
        SW06: {}
        SW07: {}
        SW08: {}
