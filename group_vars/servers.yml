---
# Linux サーバ(ZBX*/SRV*)の接続設定。
# all/vault.yml の network_cli 前提(Cisco向け)をサーバでは上書きする。
# - paramiko: sshpass 不要でパスワードSSHできる(コントローラに sshpass 未導入のため)
# - become: enable 方式は Linux に無いので無効化(必要なら sudo を明示)
# ログイン(SUZUKI/CCNP)は all/vault.yml の ansible_user/ansible_ssh_pass を継承。
# ユーザは baseline_server.cfg.j2 の cloud-init が作成する。
ansible_connection: ansible.builtin.paramiko_ssh
ansible_become: false
ansible_network_os: null
