---
# 全ノード共通の非機密変数（認証/接続は all/vault.yml）。
# ルータ・スイッチ双方に適用される。

ccnp_domain: ccnp.local
mgmt_rd: "65001:1"
mgmt_vlan: 999               # スイッチ管理用 VLAN（SVI）

# === 環境依存の値は group_vars/all/local.yml に置く（.gitignore 済み）===========
# 以下は各自のCML環境ごとに異なるため main.yml（コミット対象）には置かない:
#   - CML 接続情報       : cml_host / cml_username / cml_password / cml_verify_cert
#   - MGMT ネットワーク  : mgmt_mask / mgmt_prefixlen / mgmt_gw / mgmt_dns
#   - MGMT アドレスプール : mgmt_pool（全CMLノードのMGMTに first-fit 割当）
# 雛形 group_vars/all/local.yml.example をコピーして自分の値に書き換えること。
# 割当は topologies/mgmt_alloc.py のリース台帳が管理（first-fit・複数ラボ同時稼働可）。
# build_topology が allocate、lab_up(absent)/teardown が release。空き確認は
# `scripts/lab.sh status`。各 playbook は _generated/<problem>/mgmt_map.yml を参照する。

# === イメージ・ファミリ ========================================
# トポロジ単位で iol / iosv を統一。family 内で role 別のイメージを使う。
# 優先順位: CLI(-e image_family=) > problem.yml の image_family > ここの既定
image_family: iol

# family × role → ノード定義/イメージ/インタフェース
device_profiles:
  iol:
    router:
      node_definition: iol-xe
      image_definition: iol-xe-17-15-01
      prefix: Ethernet
      mgmt_slot: 3
      mgmt: Ethernet0/3
      links: [Ethernet0/0, Ethernet0/1, Ethernet0/2]
    switch:
      node_definition: ioll2-xe
      image_definition: ioll2-xe-17-15-01
      prefix: Ethernet
      mgmt_slot: 15
      mgmt: Ethernet3/3
      links: [Ethernet0/0, Ethernet0/1, Ethernet0/2, Ethernet0/3,
              Ethernet1/0, Ethernet1/1, Ethernet1/2, Ethernet1/3,
              Ethernet2/0, Ethernet2/1, Ethernet2/2, Ethernet2/3,
              Ethernet3/0, Ethernet3/1, Ethernet3/2]
  # Linux サーバ(監視/自動化サービス用)。cloud-init 起動。links は slot 番号で引く
  # ため mgmt(ens2=slot0) も並びに含める。問題の lab.links では a_if/b_if >= 1 を使う。
  # ★image_definition はCML登録の正確なIDを使うこと。存在しないIDでも import は
  #   通ってしまい、起動時にスケジューラが無言で配置拒否(QUEUED→DEFINED_ON_CORE)する。
  ubuntu:
    server:
      node_definition: ubuntu
      image_definition: ubuntu-24-04-20241004
      prefix: ens
      mgmt_slot: 0
      mgmt: ens2
      links: [ens2, ens3, ens4, ens5, ens6]
  iosv:
    router:
      node_definition: iosv
      image_definition: iosv-159-3-m9
      prefix: GigabitEthernet
      mgmt_slot: 3
      mgmt: GigabitEthernet0/3
      links: [GigabitEthernet0/0, GigabitEthernet0/1, GigabitEthernet0/2]
    switch:
      node_definition: iosvl2
      image_definition: iosvl2-2020
      prefix: GigabitEthernet
      mgmt_slot: 15
      mgmt: GigabitEthernet3/3
      links: [GigabitEthernet0/0, GigabitEthernet0/1, GigabitEthernet0/2, GigabitEthernet0/3,
              GigabitEthernet1/0, GigabitEthernet1/1, GigabitEthernet1/2, GigabitEthernet1/3,
              GigabitEthernet2/0, GigabitEthernet2/1, GigabitEthernet2/2, GigabitEthernet2/3,
              GigabitEthernet3/0, GigabitEthernet3/1, GigabitEthernet3/2]

# ノード名の接頭辞から role を判定（RT→router, SW→switch, ZBX/SRV/PC→server）
# PC* はクライアント端末だが実体は ubuntu ノード＝CML/テンプレート上は server と同扱い。
node_role: >-
  {{ 'switch' if inventory_hostname.startswith('SW')
     else 'server' if (inventory_hostname.startswith('ZBX') or inventory_hostname.startswith('SRV')
                       or inventory_hostname.startswith('PC'))
     else 'router' }}
dev_prof: "{{ device_profiles[image_family][node_role] }}"

# テンプレートが使う解決済みショートカット
mgmt_if: "{{ dev_prof.mgmt }}"
mgmt_slot: "{{ dev_prof.mgmt_slot }}"
links: "{{ dev_prof.links }}"
