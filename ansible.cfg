[defaults]
# --- 基本設定 ---
# 作成したインベントリファイルをデフォルトとして読み込む
inventory = ./inventory.yml

# playbooks/ 配下から実行してもリポジトリ直下の roles/ を参照する
roles_path = ./roles

# 実行結果をYAML形式で表示する
callback_format_pretty = false
callback_result_format = yaml

# スキップされたタスクの表示を抑制して画面をすっきりさせる
display_skipped_hosts = false

# --- 接続・認証設定 ---
# SSHの指紋確認（Yes/No）を無効化（自動化の阻害を防ぐため）
# ※セキュリティ要件が厳しい場合は True にしてください
host_key_checking = False

# --- エラー処理 ---
# 失敗時に作成される .retry ファイルを作らない
retry_files_enabled = False

# --- ログ設定 ---
# 必要に応じてコメントアウトを外すと、実行ログがファイルに残ります
# log_path = ./ansible.log

[persistent_connection]
# --- ネットワーク機器接続設定 ---
# ネットワーク機器へのコマンド送信タイムアウト（秒）
# 設定反映や show tech-support など長いコマンド用に長めに確保する
command_timeout = 60

# 接続確立までのタイムアウト（秒）
connect_timeout = 60
