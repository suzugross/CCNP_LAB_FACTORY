---
id: ENARSI-BGP-NHSELF-01
title: "iBGP next-hop-self で外部経路をAS内に届ける"
exam: ENARSI
topics: [bgp, ibgp, next-hop]
difficulty: 4
topology: ad-hoc
target_nodes: [RT01, RT02, RT03]
points: 100

# === トポロジ配線 =============================================
# RT03(AS65003) --eBGP-- RT01(AS65001) --iBGP-- RT02(AS65001)
# RT03 が 203.0.113.0/24 を eBGP で広告。RT01 は iBGP で RT02 に渡すが
# next-hop が外部リンク(10.1.13.2)のまま → RT02 は到達不能で RIB に入らない。
# 受験者は RT01 で next-hop-self を設定して解決する。
lab:
  links:
    - { a: RT01, a_if: 0, b: RT02, b_if: 0 }   # 10.1.12.0/30 (iBGP, AS65001内)
    - { a: RT01, a_if: 1, b: RT03, b_if: 0 }   # 10.1.13.0/30 (eBGP)
