# NETAUTO-03 の穴候補。採点は機器の最終状態のみ＝どこを穴にしても正解不変。
# RESTCONF の「URL構造 / メディアタイプ / HTTPメソッド / YANG payload」を穴で問う。
default_count: 4
blanks:
  - id: sh_yang_module
    file: 01_get.sh
    find: "restconf/data/ietf-interfaces:interfaces"
    blank: "restconf/data/____:interfaces"
    answer: "ietf-interfaces"
    hint: "設定データは /restconf/data/<YANGモジュール名>:<コンテナ> で指す。IFの標準モジュールは ietf-◯◯"
  - id: py_get_method
    file: 02_get_interfaces.py
    find: "requests.get(url"
    blank: "requests.____(url"
    answer: "get"
    hint: "「読み取り」の HTTP メソッド（show コマンド相当）"
  - id: py_accept
    file: 02_get_interfaces.py
    find: "{\"Accept\": \"application/yang-data+json\"}"
    blank: "{\"Accept\": \"application/yang-data+____\"}"
    answer: "json"
    hint: "RESTCONF の応答形式を指定するメディアタイプ application/yang-data+◯◯（XMLではない方）"
  - id: py_put_method
    file: 03_create_loopback.py
    find: "requests.put(url"
    blank: "requests.____(url"
    answer: "put"
    hint: "URL が指すリソースを payload で「丸ごと作成/置換」する HTTP メソッド"
  - id: py_if_type
    file: 03_create_loopback.py
    find: "\"iana-if-type:softwareLoopback\""
    blank: "\"iana-if-type:____\""
    answer: "softwareLoopback"
    hint: "Loopback の IF 種別（iana-if-type モジュール、software◯◯）"
  - id: py_content_type
    file: 03_create_loopback.py
    find: "\"Content-Type\": \"application/yang-data+json\""
    blank: "\"Content-Type\": \"application/yang-data+____\""
    answer: "json"
    hint: "書き込み時に payload の形式をサーバへ伝えるヘッダの値（Accept と同じメディアタイプ）"
