---
# 【完成品・編集不要】各ルータの Loopback0 に description を付ける。
# インベントリ(hosts.ini)が正しく書けていれば、この playbook が3台に到達して成功する。
# 実行: ansible-playbook set_desc.yml
- name: Loopback0 に Ansible 管理マークを付ける
  hosts: routers
  gather_facts: false
  tasks:
    - name: set description
      cisco.ios.ios_config:
        parents: interface Loopback0
        lines:
          - description MANAGED-BY-ANSIBLE
