# ===== Lesson 01: インベントリ =====
# Ansible が「どこへ・どうやって」接続するかを書くファイル。
# [routers] グループに3台を並べ、各 ansible_host に管理IPを書く。
# [routers:vars] にグループ共通の接続情報を書く。__FILL_n__ を埋めること。
[routers]
RT01 ansible_host=10.1.10.11
RT02 ansible_host=10.1.10.12
RT03 ansible_host=10.1.10.13

[routers:vars]
ansible_user=SUZUKI
ansible_password=CCNP
# ネットワーク機器へ SSH で CLI 接続する「接続プラグイン」(server 用の ssh とは別)
ansible_connection=__FILL_1__
# 対象プラットフォーム。cisco.ios.◯◯ の形式
ansible_network_os=cisco.ios.__FILL_2__
