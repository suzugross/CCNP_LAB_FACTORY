# Lesson01の穴候補（接続の2概念）。採点は最終状態のみなので穴位置に依存しない。
default_count: 2
blanks:
  - id: connection
    file: hosts.ini
    find: "ansible_connection=network_cli"
    blank: "ansible_connection=____"
    answer: "network_cli"
    hint: "ネットワーク機器にSSHでCLI接続する接続プラグイン(server用 ssh とは別)"
  - id: network_os
    file: hosts.ini
    find: "ansible_network_os=cisco.ios.ios"
    blank: "ansible_network_os=cisco.ios.____"
    answer: "ios"
    hint: "対象プラットフォーム。cisco.ios.◯◯"
