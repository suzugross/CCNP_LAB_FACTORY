# FGT-REPLACE-01: ASA→FortiGate リプレース体験問（BL-049・FGT シリーズ卒業試験）
# ★専用運用ツール: .venv/bin/python3 topologies/fgtreplace_ops.py build|grade|solve|status|stop
id: FGT-REPLACE-01
title: ASA→FortiGate リプレース — 現行機の config を読み解き、移行せよ
exam: ENCOR   # マルチベンダ FW 移行 = 概念の抽象化(SL/ACL/NAT)を問う総合演習
topics: [asa-config-reading, firewall-migration, security-level, vip-dnat, ippool-snat, implicit-deny, fortigate]
difficulty: 4
topology: FGT-LAB 共用ラボ (poc/fortigate/fgt-lab.yaml)
target_nodes: [fgt1]
fixed_nodes: [ISP1, ISP2, INET, SW2, SW3, pcA, pcB, dmz1, RBR, pcC]   # 据付・変更禁止(共用ラボの他問題機材含む)
points: 100
access: console+gui   # FGT は console と GUI(https://10.1.10.11) 併用
notes: |
  体験型: 現行 ASA running-config(紙面=running-config.txt・ノード起動なし)を読み解き、
  同一サービスレベルを FGT 3IF で再実装。核= ①security-level 暗黙許可の明示化
  (移行漏れを Phase 3 で体験) ②static NAT→1:1 VIP(オフサブネット 2.2.2.1)
  ③PAT アドレス→ippool 2.2.2.10 ④HA/inspect icmp は移行対象外の判断。
  BASIC-01・IPSEC-01 クリア後の卒業試験ポジション。
  ★fgt1 は eval ライセンス済み VM — wipe/factoryreset 厳禁(ライセンス消失)。
  ★FGT-SDWAN-01/FW-BASIC-01 と CML ラボ共用(FGT-LAB)。build が相互の設定を巻き戻す。
