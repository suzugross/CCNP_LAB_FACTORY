# FGT-IPSEC-01: Cisco IOS ⇄ FortiGate サイト間 IPsec VPN（BL-048）
# ★専用運用ツール: .venv/bin/python3 topologies/fgtipsec_ops.py build|grade|solve|status|stop
id: FGT-IPSEC-01
title: マルチベンダ サイト間 VPN — Cisco と FortiGate を IKEv2 で対向させる
exam: ENCOR   # IPsec/IKEv2 の Describe+実装を interop 体験で底上げ（ENARSI VPN とも接続）
topics: [ipsec, ikev2, svti, route-based-vpn, interop, fortigate, pfs]
difficulty: 3
topology: FGT-LAB 共用ラボ (poc/fortigate/fgt-lab.yaml)
target_nodes: [fgt1, RBR]
fixed_nodes: [ISP1, ISP2, INET, SW2, SW3, pcA, pcB, pcC, dmz1]   # 据付・変更禁止
points: 100
access: console+gui   # FGT は console/GUI 併用・RBR は console (SUZUKI/CCNPccnp)
notes: |
  体験型: 「社内標準 AES256 が入らない(eval=LENC)」→設計変更判断、
  「proposal を揃えてもネゴ拒否(no policy configured)」→両側デバッグ、の
  2つの計画崩しが核。採点は単段（端末間疎通/SA 状態/設定）。
  ★fgt1 は eval ライセンス済み VM — wipe/factoryreset 厳禁(ライセンス消失)。
  ★FGT-SDWAN-01 / FGT-FW-BASIC-01 と CML ラボ(FGT-LAB)を共用。
