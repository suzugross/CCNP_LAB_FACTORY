---
# ENCOR-FNF-01 バリアント "v2"（値・機能を変えたデモ変種）。
#   ・アドレス/セグメントを変更
#   ・L4 ポート(src/dst)を必須キーに含める + ToS も match
#   ・collect を拡張（long カウンタ + タイムスタンプ）
#   ・サンプラー有効（random 1 out-of 2）
# 採点(grading.yml.j2)とタスク文(task.md.j2)はこれらに自動追従する。

rt01_lo: 11.11.11.11
rt02_lo: 22.22.22.22
rt03_lo: 33.33.33.33
seg12: 10.20.12
seg23: 10.20.23

rec_name: REC-V2
exp_name: EXP-V2
mon_name: MON-V2

collector_ip: 203.0.113.50
udp_port: 9995
exp_source: Loopback0

extra_match_keys:
  - ipv4 protocol
  - ipv4 tos
  - transport source-port
  - transport destination-port
collect_fields:
  - counter bytes long
  - counter packets long
  - timestamp sys-uptime first
  - timestamp sys-uptime last

sampler:
  enabled: true
  name: SAMP-V2
  mode: random 1 out-of 2
