---
# 採点基準 (ENARSI-MPLS-L3VPN-02)。収集=ssh(iol-xe)。RT01=PE1 / RT02=P / RT03=PE2。
# 効果ベース: PE-CE OSPF 隣接 → VPNv4 経路(RD単位) → VRF RIB → CE の OSPF 学習
# → 広告制御(10.99 が対向に無い/収容 PE には有る) → E2E → MSS(config) → 制約。
# 注: 両 PE が同一プロセス番号のため対向経路は CE 上で O IA になり得る
#     → LSA タイプに依存しない `Known via "ospf 1"` で判定。
problem: ENARSI-MPLS-L3VPN-02
total_points: 100

defaults:
  genie_os: iosxe

checks:
  # === PE-CE OSPF 隣接 (VRF 別プロセス) ===
  - name: "RT01(PE1): VRF CUST_A で CE RT04(4.4.4.4) と OSPF 隣接 FULL"
    node: RT01
    command: "show ip ospf neighbor"
    raw:
      - regex: "4\\.4\\.4\\.4\\s+\\d+\\s+FULL"
    points: 3

  - name: "RT01(PE1): VRF CUST_B で CE RT06(6.6.6.6) と OSPF 隣接 FULL"
    node: RT01
    command: "show ip ospf neighbor"
    raw:
      - regex: "6\\.6\\.6\\.6\\s+\\d+\\s+FULL"
    points: 3

  - name: "RT03(PE2): VRF CUST_A で CE RT05(5.5.5.5) と OSPF 隣接 FULL"
    node: RT03
    command: "show ip ospf neighbor"
    raw:
      - regex: "5\\.5\\.5\\.5\\s+\\d+\\s+FULL"
    points: 3

  - name: "RT03(PE2): VRF CUST_B で CE RT07(7.7.7.7) と OSPF 隣接 FULL"
    node: RT03
    command: "show ip ospf neighbor"
    raw:
      - regex: "7\\.7\\.7\\.7\\s+\\d+\\s+FULL"
    points: 3

  # === CE 広告の受信 (機器管理 /32 は収容 PE の VRF までは来る) ===
  - name: "RT01(PE1): VRF CUST_A に RT04 の機器管理 10.99.4.1/32 が OSPF(10) で載る"
    node: RT01
    command: "show ip route vrf CUST_A 10.99.4.1"
    raw:
      - regex: "Known via \"ospf 10\""
    points: 4

  # === VPNv4 経路 (RD 単位・重複プレフィックス) ===
  - name: "RT01(PE1): RD 65000:100 の VPNv4 経路として 172.16.2.0/24 (CUST_A site2) が届く"
    node: RT01
    command: "show bgp vpnv4 unicast rd 65000:100 172.16.2.0"
    raw:
      - regex: "65000:100:172\\.16\\.2\\.0"
    points: 3

  - name: "RT01(PE1): RD 65000:200 の VPNv4 経路として 172.16.2.0/24 (CUST_B site2) が届く"
    node: RT01
    command: "show bgp vpnv4 unicast rd 65000:200 172.16.2.0"
    raw:
      - regex: "65000:200:172\\.16\\.2\\.0"
    points: 3

  - name: "RT03(PE2): RD 65000:100 の VPNv4 経路として 172.16.1.0/24 (CUST_A site1) が届く"
    node: RT03
    command: "show bgp vpnv4 unicast rd 65000:100 172.16.1.0"
    raw:
      - regex: "65000:100:172\\.16\\.1\\.0"
    points: 3

  - name: "RT03(PE2): RD 65000:200 の VPNv4 経路として 172.16.1.0/24 (CUST_B site1) が届く"
    node: RT03
    command: "show bgp vpnv4 unicast rd 65000:200 172.16.1.0"
    raw:
      - regex: "65000:200:172\\.16\\.1\\.0"
    points: 3

  # === VRF RIB への取り込み ===
  - name: "RT01(PE1): VRF CUST_A の RIB に 172.16.2.0/24 が BGP で載る"
    node: RT01
    command: "show ip route vrf CUST_A"
    parser: "show ip route"
    find: "vrf.CUST_A.address_family.*.routes.*"
    match:
      route: "172.16.2.0/24"
      source_protocol: "bgp"
    points: 3

  - name: "RT01(PE1): VRF CUST_B の RIB に 172.16.2.0/24 が BGP で載る"
    node: RT01
    command: "show ip route vrf CUST_B"
    parser: "show ip route"
    find: "vrf.CUST_B.address_family.*.routes.*"
    match:
      route: "172.16.2.0/24"
      source_protocol: "bgp"
    points: 3

  - name: "RT03(PE2): VRF CUST_A の RIB に 172.16.1.0/24 が BGP で載る"
    node: RT03
    command: "show ip route vrf CUST_A"
    parser: "show ip route"
    find: "vrf.CUST_A.address_family.*.routes.*"
    match:
      route: "172.16.1.0/24"
      source_protocol: "bgp"
    points: 3

  - name: "RT03(PE2): VRF CUST_B の RIB に 172.16.1.0/24 が BGP で載る"
    node: RT03
    command: "show ip route vrf CUST_B"
    parser: "show ip route"
    find: "vrf.CUST_B.address_family.*.routes.*"
    match:
      route: "172.16.1.0/24"
      source_protocol: "bgp"
    points: 3

  # === CE が対向 LAN を OSPF で学習 (BGP→OSPF 再配布) ===
  - name: "RT04(CUST_A CE1): 対向サイト LAN 172.16.2.0/24 を OSPF で学習"
    node: RT04
    command: "show ip route 172.16.2.0"
    raw:
      - regex: "Known via \"ospf 1\""
    points: 4

  - name: "RT06(CUST_B CE1): 対向サイト LAN 172.16.2.0/24 を OSPF で学習"
    node: RT06
    command: "show ip route 172.16.2.0"
    raw:
      - regex: "Known via \"ospf 1\""
    points: 4

  # === 広告制御: 機器管理 /32 は VPN をまたがない ===
  - name: "RT03(PE2): VRF CUST_A に RT04 の 10.99.4.1/32 が届いていない (広告制御)"
    node: RT03
    command: "show ip route vrf CUST_A 10.99.4.1 255.255.255.255"
    raw:
      - regex: "not in table"
    points: 4

  - name: "RT03(PE2): VRF CUST_B に RT06 の 10.99.6.1/32 が届いていない (広告制御)"
    node: RT03
    command: "show ip route vrf CUST_B 10.99.6.1 255.255.255.255"
    raw:
      - regex: "not in table"
    points: 4

  - name: "RT01(PE1): VRF CUST_A に RT05 の 10.99.5.1/32 が届いていない (広告制御・逆方向)"
    node: RT01
    command: "show ip route vrf CUST_A 10.99.5.1 255.255.255.255"
    raw:
      - regex: "not in table"
    points: 4

  # === E2E ===
  - name: "RT04(CUST_A CE1): サイト間 E2E 疎通 172.16.1.1 → 172.16.2.1"
    node: RT04
    command: "ping 172.16.2.1 source 172.16.1.1 repeat 5"
    raw:
      - regex: "Success rate is [1-9]"
    points: 8

  - name: "RT06(CUST_B CE1): サイト間 E2E 疎通 172.16.1.9 → 172.16.2.9"
    node: RT06
    command: "ping 172.16.2.9 source 172.16.1.9 repeat 5"
    raw:
      - regex: "Success rate is [1-9]"
    points: 8

  - name: "RT04(CUST_A CE1): CUST_B のホスト 172.16.2.9 へは到達できない (顧客間分離)"
    node: RT04
    command: "ping 172.16.2.9 source 172.16.1.1 repeat 2"
    raw:
      - regex: "Success rate is 0"
    points: 3

  - name: "RT04(CUST_A CE1): 対向サイトの機器管理 10.99.5.1 へは到達できない (広告制御の実効)"
    node: RT04
    command: "ping 10.99.5.1 source 172.16.1.1 repeat 2"
    raw:
      - regex: "Success rate is 0"
    points: 3

  # === MSS 調整 (PE の CE 向け IF ×4) ===
  - name: "RT01(PE1): CE RT04 向け IF に ip tcp adjust-mss 1452"
    node: RT01
    command: "show running-config interface Ethernet0/1"
    raw:
      - regex: "ip tcp adjust-mss 1452"
    points: 3

  - name: "RT01(PE1): CE RT06 向け IF に ip tcp adjust-mss 1452"
    node: RT01
    command: "show running-config interface Ethernet0/2"
    raw:
      - regex: "ip tcp adjust-mss 1452"
    points: 3

  - name: "RT03(PE2): CE RT05 向け IF に ip tcp adjust-mss 1452"
    node: RT03
    command: "show running-config interface Ethernet0/1"
    raw:
      - regex: "ip tcp adjust-mss 1452"
    points: 3

  - name: "RT03(PE2): CE RT07 向け IF に ip tcp adjust-mss 1452"
    node: RT03
    command: "show running-config interface Ethernet0/2"
    raw:
      - regex: "ip tcp adjust-mss 1452"
    points: 3

  # === 制約 ===
  - name: "RT01(PE1): 顧客 VRF にスタティックを使っていない"
    node: RT01
    command: "show running-config | include ip route vrf CUST"
    raw:
      - not_contains: "ip route vrf CUST"
    points: 2

  - name: "RT03(PE2): 顧客 VRF にスタティックを使っていない"
    node: RT03
    command: "show running-config | include ip route vrf CUST"
    raw:
      - not_contains: "ip route vrf CUST"
    points: 2

  - name: "RT02(P): BGP を持たない (コアは顧客経路を知らない)"
    node: RT02
    command: "show running-config | section router bgp"
    raw:
      - not_contains: "router bgp"
    points: 2
