  description: UM2-BUILD-01 skeleton (student build lab)
  notes: 'UM2-BUILD-02(ワンアームLB変種): 受講者は L3SW1/L3SW2/FW1/FW2/LB1/LB2 をtask.md の設定仕様書どおりに構築する。BACKBONE/USER-PC/DMZ-SV は据付(変更禁止)。'
