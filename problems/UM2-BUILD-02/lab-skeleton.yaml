- id: USERPC
  label: USER-PC
  node_definition: alpine
  configuration: '#!/bin/sh

    # Trust zone user (VLAN 100) - P3: alpine day0 probe

    ip addr add 172.16.100.101/24 dev eth0

    ip link set eth0 up

    ip route add default via 172.16.100.1

    touch /tmp/day0_ok

    '
  x: -180
  y: 120
  tags:
  - servers
  interfaces:
  - id: USERPC-i0
    label: eth0
    type: physical
    slot: 0
- id: DMZSV
  label: DMZ-SV
  node_definition: alpine
  configuration: '#!/bin/sh

    # DMZ server (VLAN 251) - public 2.2.2.1 via FW+LB double NAT (one-arm: L3SW2 Gi1/0 access 251)

    ip addr add 172.16.251.101/24 dev eth0

    ip link set eth0 up

    ip route add default via 172.16.251.1

    mkdir -p /var/www

    echo "UM2 DMZ SERVER" > /var/www/index.html

    httpd -p 80 -h /var/www

    touch /tmp/day0_ok

    '
  x: 320
  y: 120
  tags:
  - servers
  interfaces:
  - id: DMZSV-i0
    label: eth0
    type: physical
    slot: 0
