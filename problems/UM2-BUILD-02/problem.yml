# UM2-BUILD-02: Untrustワンアーム構成の構築問（ワンアームLB変種・BUILD-01 の姉妹問）
# ★専用運用ツール: .venv/bin/python3 topologies/um2_ops.py --variant onearm build|grade|solve|status|destroy
#   (solve は検証用: 模範解答= poc/um2/poc-um2-onearm-lab.yaml の configuration 群を console 投入)
id: UM2-BUILD-02
title: Untrustワンアーム構成の構築（ワンアームLB版・腕1本多重）
exam: DESIGN
topics: [vrf-lite, hsrp, track, one-arm, asa-failover, nat, vip, dot1q, zone]
difficulty: 5
topology: um2-onearm (problems/UM2-BUILD-02/lab-skeleton.yaml)
target_nodes: [L3SW1, L3SW2, FW1, FW2, LB1, LB2]
fixed_nodes: [BACKBONE, USER-PC, DMZ-SV]   # 据付・変更禁止（DMZ-SV 収容ポートは受講者作業）
points: 100
# 収集は全ノード CML コンソール（受講者もコンソールで解く）。MGMT/リース不要
access: console
# ★機器ログイン: IOS/ASA とも SUZUKI / CCNPccnp（ASA は受講者が初回 enable 時に
#   ウィザードで 8 文字パスワードを設定する。task.md に明記）。alpine = root or cisco/cisco
notes: |
  BUILD-01(インラインLB)との対比が核: ワンアームは腕断で上下サブIFが同時消滅する
  構造のためLB相互トラッキング不要（R7考察課題）。golden は 2026-07-11 実機検証済
  プロトタイプの完全復元。実機フルサイクル済(2026-07-11・出題可): 0点発射0/100→
  solve→100/100＋LB腕断デモ実証(上下同時切替・無損失・preempt復帰)。
  CML 20ノード上限のため BUILD-01 と同時起動不可。
  設計一次ソース= problems/_drafts/UM2.design.md
