---
# DMVPN Phase 2 マルチスポーク（暗号なし）。RT04 = WAN/NBMA トランジット(変更不可)に
# Hub(RT01) / Spoke1(RT02) / Spoke2(RT03) が各 /30 で接続。overlay は単一 Tunnel0(mGRE)。
# 学習核心 = ハブの no ip next-hop-self / no ip split-horizon により
#   スポークが対向スポークの経路を「ハブ経由でなく直接」学習し、NHRP 解決で
#   スポーク間ダイレクトトンネルが張られること(Phase 2)。
id: DMVPN-POC-01
title: "DMVPN Phase 2 マルチスポーク (mGRE + NHRP + EIGRP overlay, 暗号なし)"
exam: ENARSI
topics: [dmvpn, mgre, nhrp, eigrp, phase2, spoke-to-spoke]
difficulty: 5
topology: ad-hoc
image_family: iosv
target_nodes: [RT01, RT02, RT03, RT04]
points: 100

# IOSv は network_cli(SSH) 不可 → 採点は CML コンソール経由で show を収集。
access: console

# Underlay(NBMA) = 各エッジ↔RT04 の /30。エッジは default route で RT04 へ。
#   RT01(Hub)  Gi0/0 10.0.14.1/30 -- 10.0.14.2 RT04 Gi0/0
#   RT02(Sp1)  Gi0/0 10.0.24.1/30 -- 10.0.24.2 RT04 Gi0/1
#   RT03(Sp2)  Gi0/0 10.0.34.1/30 -- 10.0.34.2 RT04 Gi0/2
# overlay = Tunnel0 mGRE 10.255.0.0/24 (Hub .1 / Sp1 .2 / Sp2 .3), EIGRP AS100。
lab:
  links:
    - { a: RT01, a_if: 0, b: RT04, b_if: 0 }   # Hub  underlay
    - { a: RT02, a_if: 0, b: RT04, b_if: 1 }   # Spoke1 underlay
    - { a: RT03, a_if: 0, b: RT04, b_if: 2 }   # Spoke2 underlay
