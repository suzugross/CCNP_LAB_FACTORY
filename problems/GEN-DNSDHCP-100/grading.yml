  node: SRV01
  exec: shell
  command: dig +short @127.0.0.1 srv01.ccnp.local A
  raw:
  - contains: 10.99.0.2
  points: 8
- name: 'SRV01: 正引き rt01.ccnp.local'
  node: SRV01
  exec: shell
  command: dig +short @127.0.0.1 rt01.ccnp.local A
