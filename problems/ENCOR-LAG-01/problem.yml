---
# 問題メタデータ
id: ENCOR-LAG-01
title: "L2 EtherChannel の構成（スイッチ間リンクアグリゲーション）"
exam: ENCOR
topics: [etherchannel, lag, l2]
difficulty: 3
topology: baseline-8rt
target_nodes: [SW01, SW02]      # L2スイッチ(ioll2-xe)。EtherChannel は iol ルータでは非対応のため
points: 100

# 採点はSSH不可のスイッチ(EEM非対応)に対し telnet 収集で行う（grade.yml の access: telnet）。
access: telnet

# === トポロジ配線 =============================================
# SW01 と SW02 を 2 本の物理リンクで接続（束ねる対象）。
lab:
  links:
    - { a: SW01, a_if: 0, b: SW02, b_if: 0 }   # 物理リンク1
    - { a: SW01, a_if: 1, b: SW02, b_if: 1 }   # 物理リンク2
