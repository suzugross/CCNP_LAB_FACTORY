# ENARSI-BGP-ASPATH-RM-01 採点（効果ベース：RT01 の inbound 属性が正しく付いたか）。
# 各課題 20点・部分点なし。条件は互いに素なので順序非依存。
problem: ENARSI-BGP-ASPATH-RM-01
total_points: 100
defaults:
  genie_os: iosxe
checks:
  - name: "課題1: AS65210 起源(_65210$)の経路の local-preference を 200 に (172.16.1.0/24)"
    node: RT01
    command: "show ip bgp 172.16.1.0/24"
    raw:
      - { regex: "localpref 200" }
    points: 20
  - name: "課題2: AS65220 起源(_65220$)の経路の weight を 100 に (172.16.2.0/24)"
    node: RT01
    command: "show ip bgp 172.16.2.0/24"
    raw:
      - { regex: "weight 100" }
    points: 20
  - name: "課題3: AS65230 起源(_65230$)の経路の local-preference を 50 に (172.16.3.0/24)"
    node: RT01
    command: "show ip bgp 172.16.3.0/24"
    raw:
      - { regex: "localpref 50" }
    points: 20
  - name: "課題4: AS65240 起源(_65240$)の経路に community 65001:444 を付与 (172.16.4.0/24)"
    node: RT01
    command: "show ip bgp 172.16.4.0/24"
    raw:
      - { regex: "Community: 65001:444" }
    points: 20
  - name: "課題5: AS65250 経由(_65250_)の経路に as-path prepend 65001×2 (172.16.5.0/24)"
    node: RT01
    command: "show ip bgp 172.16.5.0/24"
    raw:
      - { regex: "65001 65001 65099 65250 65260" }
    points: 20
