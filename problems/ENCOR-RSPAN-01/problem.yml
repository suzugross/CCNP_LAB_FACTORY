---
id: ENCOR-RSPAN-01
title: "RSPAN でスイッチ間をまたいでミラー"
exam: ENCOR
topics: [rspan, span, monitor, l2, visibility]
difficulty: 5
topology: ad-hoc
target_nodes: [SW01, SW02]
points: 100

# SPAN/RSPAN は iosvl2(IOSv-L2) で動作確認済み(ioll2-xe は monitor session 非対応のことがある)。
image_family: iosv
# iosvl2 は day0 で mgmt VLAN SVI が上がらず SSH/telnet 不可 → コンソール収集で採点。
access: console

# SW01(送信元) と SW02(宛先) を 1 本のトランクで接続。RSPAN VLAN をこのトランクで運ぶ。
lab:
  links:
    - { a: SW01, a_if: 0, b: SW02, b_if: 0 }   # Gi0/0 <-> Gi0/0 (trunk, RSPAN VLAN 搬送)
