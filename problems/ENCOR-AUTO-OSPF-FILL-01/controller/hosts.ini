# ============================================================
# インベントリ: 設定対象ルータ（RT01〜RT03）と接続情報。
#   各ルータは管理IP 10.1.10.11〜.13 で SSH 到達できる（ユーザ SUZUKI / CCNP・特権15）。
#   __FILL_1__ / __FILL_2__ を正しい値に書き換えてから ospf.yml を実行すること。
# ============================================================
[routers]
RT01 ansible_host=10.1.10.11
RT02 ansible_host=10.1.10.12
RT03 ansible_host=10.1.10.13

[routers:vars]
ansible_user=SUZUKI
ansible_password=CCNP

# TODO①: ネットワーク機器へ CLI で接続する Ansible の「接続方式（connection plugin）」名を入れる。
ansible_connection=__FILL_1__

# TODO②: 対象プラットフォーム。cisco.ios コレクションの OS 名を「cisco.ios.◯◯」の形式で入れる。
ansible_network_os=cisco.ios.__FILL_2__
