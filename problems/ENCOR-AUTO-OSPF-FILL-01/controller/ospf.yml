---
# ============================================================
# ENCOR-AUTO-OSPF-FILL-01  穴埋め Playbook
#   RT01〜RT03 に OSPF プロセス1 / エリア0 を一括構成し、全 Loopback 到達を作る。
#   __FILL_3__ / __FILL_4__ を埋めてから実行する。
#   実行: ansible-playbook -i hosts.ini ospf.yml
# ============================================================
- name: 全ルータへ OSPF を自動構成する
  hosts: routers
  gather_facts: false
  tasks:
    - name: OSPF プロセス1 を作り、全インタフェースをエリアに参加させる
      # TODO③: ルータの running-config に設定行を流し込む cisco.ios の「設定モジュール」名を入れる。
      cisco.ios.__FILL_3__:
        parents: router ospf 1
        lines:
          # TODO④: 全インタフェース(0.0.0.0 ワイルドカード全網羅)を参加させるエリア番号を入れる。
          - network 0.0.0.0 255.255.255.255 area __FILL_4__
