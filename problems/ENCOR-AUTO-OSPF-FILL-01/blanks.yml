# 穴埋め候補（FILL-01・クラシック ios_config）。gen_blanks.py が seed で穴を選ぶ。
# 採点は最終状態のみなので、どこを穴にしても正解は不変。
default_count: 3      # 4候補から seed で3つを穴にする（1つは埋まったまま＝難度調整）
blanks:
  - id: connection
    file: hosts.ini
    find: "ansible_connection=network_cli"
    blank: "ansible_connection=____"
    answer: "network_cli"
    hint: "ネットワーク機器にCLI接続するAnsibleの接続方式(connection plugin)"

  - id: network_os
    file: hosts.ini
    find: "ansible_network_os=cisco.ios.ios"
    blank: "ansible_network_os=cisco.ios.____"
    answer: "ios"
    hint: "対象プラットフォーム(cisco.ios.◯◯)"

  - id: module
    file: ospf.yml
    find: "cisco.ios.ios_config"
    blank: "cisco.ios.____"
    answer: "ios_config"
    hint: "running-configに設定行を流し込む設定モジュール"

  - id: area
    file: ospf.yml
    find: "area 0"
    blank: "area ____"
    answer: "0"
    hint: "全インタフェースを参加させるOSPFエリア番号"
