lab:
  title: CCNP-LAB-b7590c9b
  description: '{"ccnp_lease":{"p64":"RVZQTi1WWExBTi0wMQ==","nodes":{"SPINE":"10.1.10.20","LEAF1":"10.1.10.31","LEAF2":"10.1.10.32","LEAF3":"10.1.10.33","H1":"10.1.10.34","H2":"10.1.10.35","H3":"10.1.10.36","EXT":"10.1.10.37"}}}'
  notes: |
    EVPN-VXLAN-01 (BL-055): EVPN-VXLAN ファブリック教育ラボ（SDA-LISP-01 続編・伴走形式）
    - day0 = アンダーレイのみ（OSPF + Lo0 + MGMT）。EVPN/VXLAN は受講者が組む。
    - SPINE=IOL(EVPN RR・受講者設定) / LEAF1,2=サーバ leaf / LEAF3=border leaf (NX-OS×3)
    - 据付: H1(.100.11@LEAF1 vlan100) H2(.100.12@LEAF2 vlan100) H3(.200.13@LEAF2 vlan200)
      EXT(192.168.100.2/30・Lo1 198.51.100.1/24・default→LEAF3)
    - アンダーレイ: SPINE-LEAF1 10.0.1.0/30 / -LEAF2 10.0.2.0/30 / -LEAF3 10.0.3.0/30
      Lo0= SPINE 10.254.0.254, LEAF1 .1, LEAF2 .2, LEAF3 .3 (OSPF area0)
    - オーバーレイ設計(受講者が組む): AS65100 iBGP EVPN via SPINE RR・
      VLAN100/VNI10100(両leaf)・VLAN200/VNI10200(LEAF2のみ)・L3VNI=VLAN500/VNI50000・
      vrf TENANT-A・anycast GW .1 / MAC 0000.2222.3333・LEAF3=Type-5 border
    - MGMT: SPINE=.20 LEAF1=.31 LEAF2=.32 LEAF3=.33 H1=.34 H2=.35 H3=.36 EXT=.37 (10.1.10.0/26)
  version: 0.3.0
nodes:
- id: SPINE
  label: SPINE
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname SPINE
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.20 255.255.255.192
     no shutdown
    !
    interface Loopback0
     description RR loopback
     ip address 10.254.0.254 255.255.255.255
    !
    interface Ethernet0/0
     description === to LEAF1 Eth1/1 ===
     ip address 10.0.1.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/1
     description === to LEAF2 Eth1/1 ===
     ip address 10.0.2.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/2
     description === to LEAF3 Eth1/1 ===
     ip address 10.0.3.1 255.255.255.252
     no shutdown
    !
    router ospf 1
     router-id 10.254.0.254
     network 10.0.1.0 0.0.0.3 area 0
     network 10.0.2.0 0.0.0.3 area 0
     network 10.0.3.0 0.0.0.3 area 0
     network 10.254.0.254 0.0.0.0 area 0
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: 600
  y: -150
  tags: [routers]
  interfaces:
  - id: SPINE-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: SPINE-i1
    label: Ethernet0/1
    type: physical
    slot: 1
  - id: SPINE-i2
    label: Ethernet0/2
    type: physical
    slot: 2
  - id: SPINE-i3
    label: Ethernet0/3
    type: physical
    slot: 3
- id: LEAF1
  label: LEAF1
  node_definition: nxosv9000
  image_definition: nxosv9300-10-5-1-f
  configuration: |
    hostname LEAF1
    # workaround for booting to loader> prompt
    echo 'from cli import cli' > set_boot.py
    echo 'import json' >> set_boot.py
    echo 'import os' >> set_boot.py
    echo 'import time' >> set_boot.py
    echo 'bootimage = json.loads(cli("show version | json"))["nxos_file_name"]' >> set_boot.py
    echo 'set_boot = cli("conf t ; boot nxos {} ; no event manager applet BOOTCONFIG".format(bootimage))' >> set_boot.py
    echo 'i = 0' >> set_boot.py
    echo 'while i < 10:' >> set_boot.py
    echo '    try:' >> set_boot.py
    echo '        save_config = cli("copy running-config startup-config")' >> set_boot.py
    echo '        break' >> set_boot.py
    echo '    except Exception:' >> set_boot.py
    echo '        i += 1' >> set_boot.py
    echo '        time.sleep(1)' >> set_boot.py
    echo 'os.remove("/bootflash/set_boot.py")' >> set_boot.py
    event manager applet BOOTCONFIG
     event syslog pattern "Configured from vty"
     action 1.0 cli python bootflash:set_boot.py
    # minimum needed config to login
    no password strength-check
    username admin role network-admin
    username admin password cisco role network-admin
    username SUZUKI role network-admin
    username SUZUKI password CCNP role network-admin
    vrf context management
    interface mgmt0
      vrf member management
      ip address 10.1.10.31/26
      no shutdown
    feature ospf
    interface loopback0
      ip address 10.254.0.1/32
    router ospf UNDERLAY
      router-id 10.254.0.1
    interface Ethernet1/1
      no switchport
      ip address 10.0.1.2/30
      ip router ospf UNDERLAY area 0
      no shutdown
    interface loopback0
      ip router ospf UNDERLAY area 0
    interface Ethernet1/2
      switchport
      no shutdown
  x: 300
  y: 100
  tags: [switches]
  interfaces:
  - id: LEAF1-i0
    label: mgmt0
    type: physical
    slot: 0
  - id: LEAF1-i1
    label: Ethernet1/1
    type: physical
    slot: 1
  - id: LEAF1-i2
    label: Ethernet1/2
    type: physical
    slot: 2
  - id: LEAF1-i3
    label: Ethernet1/3
    type: physical
    slot: 3
