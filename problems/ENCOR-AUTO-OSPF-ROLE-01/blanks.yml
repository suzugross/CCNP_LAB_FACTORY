# 穴埋め候補。gen_blanks.py が --seed で --count 個を選び、controller_solution(完成形)を
# 元に、選ばれた箇所だけ __FILL_n__ にした配布物を生成する。採点は最終状態のみなので
# どこを穴にしても正解は不変＝「穴の位置・数」を seed でランダム化できる。
#
# 各候補: file(controller基準) / find(完成形の中の置換対象・正確な部分文字列) /
#         occurrence(複数マッチ時の何番目・既定1) / blank(穴の見た目, ____が番号に) /
#         answer(正答) / hint(問題用紙に出すヒント)
default_count: 4      # --count 省略時に穴にする数（全6候補から seed で4つ選ぶ）
blanks:
  - id: module_ospfv2
    file: roles/ospf/tasks/main.yml
    find: "cisco.ios.ios_ospfv2"
    blank: "cisco.ios.____"
    answer: "ios_ospfv2"
    hint: "OSPFv2プロセス(AS/router-id)用のリソースモジュール名"

  - id: module_ospf_if
    file: roles/ospf/tasks/main.yml
    find: "cisco.ios.ios_ospf_interfaces"
    blank: "cisco.ios.____"
    answer: "ios_ospf_interfaces"
    hint: "インタフェースをOSPFエリアに参加させるリソースモジュール名"

  - id: state_proc
    file: roles/ospf/tasks/main.yml
    find: "state: merged"
    occurrence: 1
    blank: "state: ____"
    answer: "merged"
    hint: "既存を消さず足し込む宣言的ステート(プロセス側)"

  - id: state_if
    file: roles/ospf/tasks/main.yml
    find: "state: merged"
    occurrence: 2
    blank: "state: ____"
    answer: "merged"
    hint: "既存を消さず足し込む宣言的ステート(インタフェース側)"

  - id: loop_var
    file: roles/ospf/tasks/main.yml
    find: "{{ interfaces }}"
    blank: "{{ ____ }}"
    answer: "interfaces"
    hint: "host_varsの「インタフェース一覧」の変数名(loopに渡す)"

  - id: save_when
    file: roles/ospf/handlers/main.yml
    find: "save_when: modified"
    blank: "save_when: ____"
    answer: "modified"
    hint: "running≠startupのとき保存するモード"
