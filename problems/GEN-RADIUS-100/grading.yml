- name: 'SRV01: noc-hanako 認証OK＋priv15 属性'
  node: SRV01
  exec: shell
  command: echo "User-Name=noc-hanako,User-Password=Noc-3863" | radclient -x 127.0.0.1 auth testing123
  raw:
  - regex: Received Access-Accept
  - contains: priv-lvl=15
  points: 12
- name: 'SRV01: monitor-op 認証OK＋priv1 属性'
  node: SRV01
