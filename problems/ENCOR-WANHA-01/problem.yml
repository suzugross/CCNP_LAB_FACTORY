---
# 問題メタデータ
id: ENCOR-WANHA-01
title: "デュアルGREトンネル + IP SLA/Track 自動フェイルオーバ"
exam: ENCOR
topics: [tunnel, gre, ip-sla, track, static-route, failover]
difficulty: 5
topology: ad-hoc
target_nodes: [RT01, RT02, RT03, RT04]
points: 100

# === トポロジ（各ルータ次数<=2, iol-xe links に収まる）===========
#        RT02 (Transit-A / primary, 変更禁止)
#       /                         \
#  RT01(HQ)                        RT04(Branch)
#       \                         /
#        RT03 (Transit-B / backup, 変更禁止)
#
# underlay = HQ/Branch に各トランジット経由のスタティック既設（トンネル終端到達用）。
# 受験者は HQ(RT01)/Branch(RT04) に GRE トンネル2本 + IP SLA/Track + primary/floating 経路を構成。
#   Tunnel1 = Transit-A 経由(primary) / Tunnel2 = Transit-B 経由(backup)。
lab:
  links:
    - { a: RT01, a_if: 0, b: RT02, b_if: 0 }   # 10.0.12.0/30 (HQ-TransitA)
    - { a: RT01, a_if: 1, b: RT03, b_if: 0 }   # 10.0.13.0/30 (HQ-TransitB)
    - { a: RT02, a_if: 1, b: RT04, b_if: 0 }   # 10.0.24.0/30 (TransitA-Branch)
    - { a: RT03, a_if: 1, b: RT04, b_if: 1 }   # 10.0.34.0/30 (TransitB-Branch)
