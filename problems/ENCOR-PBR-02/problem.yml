# RT04(拠点LANクライアント) -- RT01(拠点エッジ/PBR) -- {RT02=WAN-A, RT03=WAN-B} -- DC(3.3.3.3)
#   RT01 e0/0 -- RT02 e0/0 : 10.0.12.0/30   (WAN-A)
#   RT01 e0/1 -- RT03 e0/0 : 10.0.13.0/30   (WAN-B, 既定の最短=DC直結側)
#   RT01 e0/2 -- RT04 e0/0 : 10.0.14.0/30   (拠点LAN)
#   RT02 e0/1 -- RT03 e0/1 : 10.0.23.0/30
# OSPF area0 は4台とも既設・全到達可。既定では RT04→3.3.3.3 は RT01 経由で WAN-B(RT03直結)が最短。
