# 自動生成 (gen_snmpv3_ts.py) seed=200
problem: GEN-ZBXBUILD-200
total_points: 100
defaults:
  genie_os: iosxe
checks:
- name: 'RT01: ZBX01からSNMPv3で応答(sysName)=機器側構築OK'
  node: ZBX01
  exec: shell
  command: snmpget -v3 -u MONUSER -l authPriv -a SHA -A CCNP-Auth-2026 -x AES -X CCNP-Priv-2026 -t 2 -r 1 6.6.6.6 1.3.6.1.2.1.1.5.0
  raw:
  - contains: RT01
  points: 9
- name: 'RT01: Zabbix登録(対象IP/SNMP種別/テンプレ/グループ)'
  node: ZBX01
  exec: shell
  command: python3 /opt/ccnp/zbx_check.py hostinfo RT01
  raw:
  - regex: TYPE=2
  - regex: IF=6.6.6.6:161
  - regex: TEMPLATE=[^ ]*Cisco IOS by SNMP
  - regex: GROUP=[^ ]*CCNP-LAB
  points: 7
- name: 'RT01: Zabbix登録(SNMPv3パラメータ)'
