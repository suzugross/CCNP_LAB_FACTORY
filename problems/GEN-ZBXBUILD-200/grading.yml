  exec: shell
  command: python3 /opt/ccnp/zbx_check.py hostinfo RT01
  raw:
  - regex: V3USER=MONUSER
  - regex: SECLEVEL=authPriv
  - regex: 'AUTH=SHA '
  - regex: PRIV=AES128
  points: 7
- name: 'RT01: 監視データが流れている(鮮度180秒以内)'
