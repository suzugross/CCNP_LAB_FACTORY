checks:
- name: 'RT10: West LAN1 発 → East LAN1 (172.21.0.1) 到達'
  node: RT10
  command: ping 172.21.0.1 source Loopback10 repeat 5
  points: 8
  raw:
  - regex: Success rate is [1-9]
- name: 'RT10: West LAN2 発 → East LAN2 (172.21.1.1) 到達'
  node: RT10
  command: ping 172.21.1.1 source Loopback11 repeat 5
  points: 8
  raw:
  - regex: Success rate is [1-9]
- name: 'RT08: East LAN1 発 → West LAN1 (172.20.0.1) 到達（戻り経路）'
  node: RT08
  command: ping 172.20.0.1 source Loopback10 repeat 5
  points: 8
  raw:
  - regex: Success rate is [1-9]
- name: 'RT10: East への traceroute が East境界リンク(172.30.x)を経由'
  node: RT10
  command: traceroute 172.21.0.1 source Loopback10 numeric timeout 1 probe 1 ttl 1 10
  points: 6
  raw:
  - regex: 172\.30\.
- name: 'RT12(非client観測点): East LAN1 経路が反射で届き community 65001:200 付き'
  node: RT12
  command: show ip bgp 172.21.0.0
  points: 4
  raw:
  - regex: 65001:200
  - regex: (Originator|Cluster)
- name: 'RT12(非client観測点): West LAN1 経路が反射で届き community 65001:100 付き'
  node: RT12
  command: show ip bgp 172.20.0.0
  points: 3
  raw:
  - regex: 65001:100
  - regex: (Originator|Cluster)
- name: 'RT03(RR1): East LAN1 を両境界(RT07/RT09)から受信（2点再配送の冗長）'
  node: RT03
  command: show ip bgp 172.21.0.0
  points: 6
  raw:
  - contains: 7.7.7.7
  - contains: 12.12.12.12
- name: 'RT08: West LAN1 の EIGRP外部経路に管理タグ 65001（B2E再配送の設計適合）'
  node: RT08
  command: show ip eigrp topology 172.20.0.0/24
  points: 6
  raw:
  - regex: tag is 65001
- name: 'RT08: static 残置なし（暫定対処の残置禁止）'
  node: RT08
  command: show ip route static
  points: 6
  raw:
  - not_regex: (?m)^S
- name: 'RT01: OSPF 隣接 FULL (RT11/RT03/RT04)'
  node: RT01
  command: show ip ospf neighbor
  points: 5
  raw:
  - regex: (?m)^43\.43\.43\.43\s+\d+\s+FULL
  - regex: (?m)^41\.41\.41\.41\s+\d+\s+FULL
  - regex: (?m)^49\.49\.49\.49\s+\d+\s+FULL
- name: 'RT03(RR1): iBGP セッション成立 (RT01/RT07/RT12 が Established)'
  node: RT03
  command: show ip bgp summary
  points: 5
  raw:
  - regex: (?m)^53\.53\.53\.53\s.*\d$
  - regex: (?m)^7\.7\.7\.7\s.*\d$
  - regex: (?m)^33\.33\.33\.33\s.*\d$
- name: 'RT08: EIGRP 隣接 2 本 (RT07/RT09)'
  node: RT08
  command: show ip eigrp neighbors
  points: 5
  raw:
  - contains: 172.30.250.5
  - contains: 172.30.100.1
