---
# uRPF エッジ anti-spoofing 問 (BL-027)。strict/loose の使い分けが核心。
# 非対称の作り: 顧客B 192.168.100.0/24 は RT03 が実体保持(OSPF未広告)・広告は
# RT02 の static 再配布のみ → RT01 の経路は Uplink-A 向きだが実着信は Uplink-B。
# ★RT02-RT03 リンクは意図的に OSPF 外（forwarding address 罠で E2 が ECMP 化し
#   非対称が消えるため。実機検証の経緯は poc/urpf/README.md）
id: ENARSI-URPF-01
title: "エッジルータに送信元検証 (anti-spoofing) を導入せよ"
exam: ENARSI
topics: [urpf, security, anti-spoofing]
difficulty: 4
topology: urpf-edge
target_nodes: [RT01, RT02, RT03]
points: 100
access: ssh

lab:
  links:
    - { a: RT01, a_if: 0, b: RT02, b_if: 0 }   # 10.1.12.0/30 (Uplink-A: ISP-A)
    - { a: RT01, a_if: 1, b: RT03, b_if: 0 }   # 10.1.13.0/30 (Uplink-B: ISP-B)
    - { a: RT02, a_if: 1, b: RT03, b_if: 1 }   # 10.1.23.0/30 (ISP間ピアリング・OSPF外)
