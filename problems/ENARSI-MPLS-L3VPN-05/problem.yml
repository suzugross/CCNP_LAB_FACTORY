# MPLS L3VPN 発展 (VPN 内トポロジ設計: フルメッシュ × ハブ&スポークの RT 組み分け)。BL-016。
# gen_mpls_ts と同形の 12台 (3PE + P三角リング + 2顧客×3サイト) を固定アドレスで手組み。
# 初期状態 = 両顧客とも全対称 RT で全サイト any-to-any 疎通の「完成した」網。
#   - CUST_A (フラット契約): このままが正 → 環境保存
#   - CUST_B (契約改定): 「全拠点間通信は本社(site1)経由・拠点間直接ルーティング禁止」
#     → 全対称 RT のままはポリシー違反 = 監査是正チケット
# 受験者作業 (PE のみ・CE 変更禁止):
#   (1) PE1 の CUST_B 収容を顧客準備済みの VLAN10/20 サブIF 2セッションへ移行
#   (2) PE1 で下り/上りを 2 VRF に分離 (CUST_B=下り流用 / CUST_B_UP=新設 rd 65000:210)
#   (3) RT 65000:210(本社発)/220(拠点発) の import/export 配置を要件から設計
#       (spoke: export 220/import 210, hub下り: import 220, hub上り: export 210)
# 隠しひねり (task では明かさない):
#   - 仕様どおり組んでも CUST_B_UP が本社 CE からの折返し経路を AS-PATH ループ検知で
#     破棄し spoke↔spoke 不通のまま。debug bgp all updates in の
#     `DENIED due to: AS-PATH contains our own AS` から allowas-in 1 に到達させる。
#   - DENIED 経路は soft-reconfig の received-routes にも現れない (格納前破棄)。
#     CE 側 advertised-routes (show は可) との突き合わせが切り分けの芯。
#   - 折返し成立後の spoke CE 受信 AS_PATH = `65000 65201 65000 6520x` (hub AS 挟み込み)
#   - PoC 済み: poc/mpls-hubspoke/README.md (2026-07-12)
id: ENARSI-MPLS-L3VPN-05
title: "MPLS L3VPN 発展 (フルメッシュ × ハブ&スポークの RT 設計・監査是正)"
exam: ENARSI
topics: [mpls, l3vpn, vpnv4, mp-bgp, vrf, route-target, hub-and-spoke, ebgp, allowas-in]
difficulty: 4
topology: ad-hoc
image_family: iol
target_nodes: [RT01, RT02, RT03, RT04, RT05, RT06, RT07, RT08, RT09, RT10, RT11, RT12]
points: 100

