#       A2=RT09 B2=RT10 / A3=RT11 B3=RT12
# アドレス: Lo0=N.N.N.N / コア 10.1.14/25/36.0/30 / リング 10.1.45/56/46.0/30
#   PE-CE: A=192.168.<site>.0/30, B=192.168.1<site>.0/30 (CE=.1/PE=.2)
#   hub 移行用: VLAN10=192.168.111.0/30(下り) / VLAN20=192.168.112.0/30(上り)
#   LAN: 172.16.<site>.0/24 を両顧客で重複使用 (A=.1 / B=.9, Lo1)
#   CE AS: A=65101-65103 / B=65201-65203 (全てサイト毎 AS・as-override 非関与)
