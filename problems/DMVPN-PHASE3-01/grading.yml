---
# 採点基準 (DMVPN-PHASE3-01 / Phase 3 マルチスポーク, 暗号なし)。
#  ・ハブに両スポーク登録UP / 各スポークでハブUP            … show dmvpn raw
#  ・Phase 3 署名: 対向スポーク経路の next-hop は「ハブ」のまま  … show ip route genie
#    (Phase2 と逆。ハブが next-hop-self を保つ)
#  ・オンデマンド直結: 能動 ping で誘発 → show dmvpn に対向スポークへの動的エントリ UP
#  ・データプレーン疎通                                       … 能動 ping (Lo0→対向Lo0)
# RT04 は変更禁止のため採点対象外。収集は CML コンソール経由。
problem: DMVPN-PHASE3-01
total_points: 100

defaults:
  genie_os: iosxe

checks:
  - name: "RT01(Hub): 両スポークが登録され DMVPN セッションが UP"
    node: RT01
    command: "show dmvpn"
    raw:
      - contains: "Type:Hub"
      - regex: "10\\.0\\.24\\.1\\s+10\\.255\\.0\\.2\\s+UP"
      - regex: "10\\.0\\.34\\.1\\s+10\\.255\\.0\\.3\\s+UP"
    points: 10

  - name: "RT02(Spoke1): DMVPN セッションが Spoke として確立しハブが UP"
    node: RT02
    command: "show dmvpn"
    raw:
      - contains: "Type:Spoke"
      - regex: "10\\.0\\.14\\.1\\s+10\\.255\\.0\\.1\\s+UP"
    points: 5

  - name: "RT03(Spoke2): DMVPN セッションが Spoke として確立しハブが UP"
    node: RT03
    command: "show dmvpn"
    raw:
      - contains: "Type:Spoke"
      - regex: "10\\.0\\.14\\.1\\s+10\\.255\\.0\\.1\\s+UP"
    points: 5

  # ---- Phase 3 署名: 対向スポーク経路の next-hop は「ハブ」(Phase2 と逆) ----
  - name: "RT02(Spoke1): 3.3.3.3/32 を EIGRP 学習し next-hop がハブ(10.255.0.1)のまま"
    node: RT02
    command: "show ip route"
    parser: "show ip route"
    find: "vrf.*.address_family.*.routes.*"
    match:
      route: "3.3.3.3/32"
      source_protocol: eigrp
      next_hop.next_hop_list.*.next_hop: "10.255.0.1"
      next_hop.next_hop_list.*.outgoing_interface: Tunnel0
    points: 10

  - name: "RT03(Spoke2): 2.2.2.2/32 を EIGRP 学習し next-hop がハブ(10.255.0.1)のまま"
    node: RT03
    command: "show ip route"
    parser: "show ip route"
    find: "vrf.*.address_family.*.routes.*"
    match:
      route: "2.2.2.2/32"
      source_protocol: eigrp
      next_hop.next_hop_list.*.next_hop: "10.255.0.1"
      next_hop.next_hop_list.*.outgoing_interface: Tunnel0
    points: 10

  # ---- データプレーン: 支店間 ping(直結を誘発) ----
  - name: "RT02(Spoke1): 支店間で RT03 の Loopback0 に疎通 (能動・直結を誘発)"
    node: RT02
    command: "ping 3.3.3.3 source Loopback0 repeat 5"
    raw:
      - regex: "Success rate is [1-9]"
    points: 15

  - name: "RT03(Spoke2): 支店間で RT02 の Loopback0 に疎通 (能動・直結を誘発)"
    node: RT03
    command: "ping 2.2.2.2 source Loopback0 repeat 5"
    raw:
      - regex: "Success rate is [1-9]"
    points: 15

  # ---- Phase 3 の肝: オンデマンドのスポーク間ダイレクトトンネルが UP ----
  - name: "RT02(Spoke1): スポーク2への動的(直結)トンネルが UP (NHRP shortcut)"
    node: RT02
    command: "show dmvpn"
    raw:
      - regex: "10\\.0\\.34\\.1\\s+10\\.255\\.0\\.3\\s+UP"
    points: 15

  - name: "RT03(Spoke2): スポーク1への動的(直結)トンネルが UP (NHRP shortcut)"
    node: RT03
    command: "show dmvpn"
    raw:
      - regex: "10\\.0\\.24\\.1\\s+10\\.255\\.0\\.2\\s+UP"
    points: 15
