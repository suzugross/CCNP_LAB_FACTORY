---
# ENARSI-BGP-01 バリアント "mh-auth"（eBGP複合: Loopbackピア + ebgp-multihop + MD5認証）。
# peer_mode=loopback で initial(上流) と grading が loopbackピア用に切り替わる。
# AS/IP/seg は base と同値（既存トポロジを流用）。
as1: 65001          # RT01 (エッジ・受験者が設定)
as2: 65002          # RT02 (上流)
as3: 65003          # RT03 (上流)
as4: 65004          # RT04 (4.4.4.4 発信元)
rt01_lo: 1.1.1.1
rt02_lo: 2.2.2.2
rt03_lo: 3.3.3.3
rt04_lo: 4.4.4.4
seg12: 10.1.12      # RT01-RT02: .1=RT01 / .2=RT02
seg13: 10.1.13      # RT01-RT03: .1=RT01 / .2=RT03
seg24: 10.1.24      # RT02-RT04: .1=RT02 / .2=RT04
seg34: 10.1.34      # RT03-RT04: .1=RT03 / .2=RT04

# --- variant 固有フラグ -------------------------------------------------
peer_mode: loopback     # connected(既定/base) | loopback
bgp_password: CCNP-BGP  # 定義されていると neighbor password を要求
