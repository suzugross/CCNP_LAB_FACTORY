---
id: ENCOR-IPV6-STATIC-01
title: "IPv6 アドレッシング (GUA/リンクローカル) + 静的ルーティング"
exam: ENCOR
topics: [ipv6, addressing, link-local, static-routing, routing]
difficulty: 4
topology: ad-hoc
target_nodes: [RT01, RT02, RT03]
points: 100

# iol-xe ルータ。IPv6 only のチェーン RT01-RT02-RT03。動的ルーティングは使わない。
# 初期状態はデータIFが up なだけ(アドレス未設定・ipv6 unicast-routing 未設定)。
# 受験者が GUA / 手動リンクローカルのアドレッシングと、3種の静的経路
# (再帰 / 出口IF+リンクローカル / デフォルト経路) を構成する。
image_family: iol

lab:
  links:
    - { a: RT01, a_if: 0, b: RT02, b_if: 0 }   # 2001:DB8:12::/64
    - { a: RT02, a_if: 1, b: RT03, b_if: 0 }   # 2001:DB8:23::/64
