---
# ===== Lesson 05: 冪等性 と --check/--diff =====
# 全ルータに NTP サーバを設定する。__FILL_1__ に NTPサーバIP 10.123.45.6 を入れる。
# このレッスンの主眼は「実行のしかた」:
#   1) 普通に流す → 1回目 changed / 2回目 changed=0（=冪等。既にあるものは触らない）
#   2) --check --diff で「流す前に」何が変わるか確認できる
- name: NTP サーバを設定
  hosts: routers
  gather_facts: false
  tasks:
    - name: set ntp server
      cisco.ios.ios_config:
        lines:
          - "ntp server __FILL_1__"
