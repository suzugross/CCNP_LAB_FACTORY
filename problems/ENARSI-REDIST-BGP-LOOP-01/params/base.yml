# 既定値（-e variant=base または無指定で使用）。
# p_net(192.168.51) / AS(65000,100) / AD(200,170,110) はリングのループ成立条件のため固定。
# Loopback(/32) と /30 セグメントのみ variant で振れる。
p_net: 192.168.51        # RE が BGP 起点広告する被害プレフィクス 192.168.51.0/24 (RE Lo0=.1)
rc_lo: 3.3.3.3           # RC : BGP/EIGRP/OSPF 収容の被害ルータ（PDF の RC 相当）
ra_lo: 1.1.1.1           # RA : EIGRP/OSPF 境界
rb_lo: 2.2.2.2           # RB : OSPF 内部（PC4 サイト相当）
seg_ec: 10.0.13          # RE-RC  /30 (BGP)
seg_ca: 10.0.31          # RC-RA  /30 (EIGRP)
seg_cb: 10.0.32          # RC-RB  /30 (OSPF)
seg_ab: 10.0.12          # RA-RB  /30 (OSPF)
