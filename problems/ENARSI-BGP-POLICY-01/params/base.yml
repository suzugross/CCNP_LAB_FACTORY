---
# ENARSI-BGP-POLICY-01 バリアント "base"。
as_cust: 65010        # AS65010: 顧客（RT01/RT02/RT03・設定対象）
as_ispa: 65020        # ISP-A (RT04・変更不可)
as_ispb: 65030        # ISP-B (RT05・変更不可)
as_up: 65099          # 上流 (RT06・変更不可・beacon発生源)
rt01_lo: 1.1.1.1
rt02_lo: 2.2.2.2
rt03_lo: 3.3.3.3
rt04_lo: 4.4.4.4
rt05_lo: 5.5.5.5
rt06_lo: 6.6.6.6
seg14: 100.64.14      # RT01-RT04: .1=RT01 / .2=RT04
seg24: 100.64.24      # RT02-RT04: .1=RT02 / .2=RT04
seg25: 100.64.25      # RT02-RT05: .1=RT02 / .2=RT05
seg46: 100.64.46      # RT04-RT06: .1=RT04 / .2=RT06
seg56: 100.64.56      # RT05-RT06: .1=RT05 / .2=RT06
seg13: 10.10.13       # RT01-RT03: .1=RT01 / .2=RT03
seg23: 10.10.23       # RT02-RT03: .1=RT02 / .2=RT03
cust_net: 198.51.100  # 顧客保有 /24（実体は RT03 の /25×2）
beacon_a: 192.0.2     # 通常トラフィック代表 /24 (RT06発)
beacon_b: 203.0.113   # 例外ポリシー対象 /24 (RT06発・ISP-B優先にさせる)
beacon_c: 198.18.100  # 通常その2 /24 (RT06発・採点の冗長性用)
leak_rfc: 172.16.66   # RT04が意図的にリークする RFC1918 /24
leak_long: 198.18.200.16   # RT04が意図的にリークする /28（/24より長い）
comm_a: "65010:100"   # ISP-A 由来の識別 community（要件で指定）
comm_b: "65010:200"   # ISP-B 由来の識別 community（要件で指定）
