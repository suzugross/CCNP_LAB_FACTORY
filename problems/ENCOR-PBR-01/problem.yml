---
id: ENCOR-PBR-01
title: "送信元別の経路振り分け"
exam: ENCOR
topics: [pbr, routing]
difficulty: 4
topology: ad-hoc
target_nodes: [RT01, RT02, RT03]
points: 100

# === トポロジ配線 =============================================
# RT01(支社) を頂点とする三角形。RT02/RT03 は DC(3.3.3.3) への2経路。
#   RT01 e0/0 -- RT02 e0/0 : 10.0.12.0/30
#   RT01 e0/1 -- RT03 e0/0 : 10.0.13.0/30
#   RT02 e0/1 -- RT03 e0/1 : 10.0.23.0/30
# OSPF area0 は3台とも既設・全到達可。既定では RT01→3.3.3.3 は最短=直結のRT03経由。
# 受験者は RT01 のみ変更し、開発部(Lo2)発のDC宛だけを RT02 経由に分離する。
lab:
  links:
    - { a: RT01, a_if: 0, b: RT02, b_if: 0 }   # 10.0.12.0/30
    - { a: RT01, a_if: 1, b: RT03, b_if: 0 }   # 10.0.13.0/30
    - { a: RT02, a_if: 1, b: RT03, b_if: 1 }   # 10.0.23.0/30
