---
# ===== Lesson 03: Playbook の構造 =====
# Playbook = 「どの機器に(hosts)」「何を(tasks)」を YAML で書いたファイル。
# 各 task は name(説明) と モジュール で構成。ios_config は parents(階層)＋lines(行)。
# __FILL_n__ を埋めて  ansible-playbook pb.yml  で実行する。

- name: Loopback3 を作る Playbook
  # TODO①: 対象グループ名（インベントリの [____]）
  hosts: __FILL_1__
  gather_facts: false
  tasks:
    - name: Loopback3 に IP と description を設定
      # TODO②: 設定を投入するモジュール
      cisco.ios.__FILL_2__:
        # TODO③: どの設定階層に入るか（"interface Loopback3"）
        parents: __FILL_3__
        lines:
          - ip address 33.33.33.33 255.255.255.255
          - description DOJO-03
