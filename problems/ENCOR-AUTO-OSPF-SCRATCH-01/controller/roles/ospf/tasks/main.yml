# roles/ospf/tasks/main.yml
# ★ここを「ゼロから」書く。host_vars/<host>.yml に OSPF 設計データがある:
#     ospf.process_id / ospf.router_id / interfaces[].name / interfaces[].area
#
# 達成すること（手段は自由・推奨はリソースモジュール）:
#   1. OSPF プロセスを作り、router-id を ospf.router_id にする
#   2. interfaces の各 IF を ospf.process_id / area に参加させる
#   3. 設定が変わったら handler 'save ospf config' を notify して保存する
#
# ヒント: cisco.ios.ios_ospfv2 / cisco.ios.ios_ospf_interfaces（state: merged）、
#         loop で host_vars の interfaces を回す。書き方は ROLE-01 の考え方を踏襲。

# （ここに tasks を記述）
