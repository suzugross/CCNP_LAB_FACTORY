lab:
  title: CCNP-LAB-95bb4c6b
  description: '{"ccnp_lease":{"p64":"U0RBLUxJU1AtMDE=","nodes":{"MSMR":"10.1.10.37","XTR1":"10.1.10.38","XTR2":"10.1.10.39","PXTR":"10.1.10.40","EXT":"10.1.10.41","LEAF1":"10.1.10.42","LEAF2":"10.1.10.43","H1":"10.1.10.44","H2":"10.1.10.45"}}}'
  notes: |
    SDA-LISP-01 (BL-054): SD-Access 中核技術のガイド付き教育ラボ — LISP(iol-xe) + EVPN-VXLAN(nxosv9300)
    - 受講者は CML コンソールで task.md の Phase を進める(伴走形式・採点は軽い最終疎通確認のみ)。
    - day0 済み: 全ノードの MGMT/認証、LISP編アンダーレイ(OSPF+RLOC Lo0)、EXT(据付)、
      VXLAN編アンダーレイ(OSPF+Lo0)、H1/H2(据付ホスト)。
    - 受講者が組む: LISP 全て(MS/MR・xTR・PxTR)、VXLAN オーバーレイ(feature 群〜BGP EVPN〜NVE〜アクセスポート)。
    - アドレス: LISP コア 10.0.1-3.0/30, RLOC Lo0 10.255.0.1-4/32, EID 172.16.1-2.0/24(Lo1),
      PXTR-EXT 192.168.100.0/30, 外部 198.51.100.0/24(EXT Lo1)。
      VXLAN: leaf 間 10.0.99.0/30, Lo0 10.254.0.1-2/32, オーバーレイ 172.16.100.0/24 (H1=.11, H2=.12)。
    - MGMT: MSMR=.37 XTR1=.38 XTR2=.39 PXTR=.40 EXT=.41 LEAF1=.42 LEAF2=.43 H1=.44 H2=.45 (10.1.10.0/26)
    - 運用: topologies/sda_ops.py build|status|solve|grade|stop|teardown
  version: 0.3.0
nodes:
- id: MSMR
  label: MSMR
  node_definition: iol-xe
  image_definition: iol-xe-17-15-01
  configuration: |
    hostname MSMR
    !
    ip domain name ccnp.local
    ip cef
    no ip http server
    no ip http secure-server
    !
    enable secret CCNP
    username SUZUKI privilege 15 secret CCNP
    !
    vrf definition MGMT
     rd 65001:1
     address-family ipv4
     exit-address-family
    !
    interface Ethernet0/3
     description === MGMT (Ansible) ===
     vrf forwarding MGMT
     ip address 10.1.10.37 255.255.255.192
     no shutdown
    !
    interface Loopback0
     description RLOC
     ip address 10.255.0.1 255.255.255.255
    !
    interface Ethernet0/0
     description === to XTR1 ===
     ip address 10.0.1.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/1
     description === to XTR2 ===
     ip address 10.0.2.1 255.255.255.252
     no shutdown
    !
    interface Ethernet0/2
     description === to PXTR ===
     ip address 10.0.3.1 255.255.255.252
     no shutdown
    !
    router ospf 1
     router-id 10.255.0.1
     network 10.0.1.0 0.0.0.3 area 0
     network 10.0.2.0 0.0.0.3 area 0
     network 10.0.3.0 0.0.0.3 area 0
     network 10.255.0.1 0.0.0.0 area 0
    !
    ip ssh version 2
    !
    event manager applet GEN-SSH-KEY authorization bypass
     event timer countdown time 30
     action 1.0 cli command "enable"
     action 2.0 cli command "configure terminal"
     action 3.0 cli command "crypto key generate rsa modulus 2048"
     action 4.0 syslog msg "EEM GEN-SSH-KEY: RSA key generated"
    !
    line con 0
     exec-timeout 0 0
     logging synchronous
    line vty 0 4
     exec-timeout 0 0
     login local
     transport input ssh
  x: 200
  y: 0
  tags: [routers]
  interfaces:
  - id: MSMR-i0
    label: Ethernet0/0
    type: physical
    slot: 0
  - id: MSMR-i1
    label: Ethernet0/1
    type: physical
    slot: 1
  - id: MSMR-i2
    label: Ethernet0/2
    type: physical
    slot: 2
  - id: MSMR-i3
    label: Ethernet0/3
    type: physical
    slot: 3
