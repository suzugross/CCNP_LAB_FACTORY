# SDA-LISP-01: SD-Access 原理体感ラボ（LISP + EVPN-VXLAN・BL-054）
# ★専用運用ツール: python3 topologies/sda_ops.py build|status|solve|grade|stop|teardown
id: SDA-LISP-01
title: SD-Access の中身を素手で組む — LISP と VXLAN の原理ラボ
exam: ENCOR   # 1.x アーキテクチャ(SD-Access)の Describe を実機体験で底上げする教材
topics: [sd-access, lisp, vxlan, evpn, overlay, map-server, xtr, pxtr, nve]
difficulty: 3
topology: "problems/SDA-LISP-01/sda-lab.yaml（静的・9台一体型: LISP編5台 iol-xe + VXLAN編 nxosv9300×2 + ホスト2台）"
target_nodes: [MSMR, XTR1, XTR2, PXTR, LEAF1, LEAF2]
fixed_nodes: [EXT, H1, H2]   # 据付・変更禁止（EXT=非LISP外部網 / H1,H2=VXLANホスト）
points: 100
access: console   # 受講者は CML コンソールで解く（伴走形式）
notes: |
  体験型・伴走形式（ガイド付き教育ラボ・BL-054）: task.md の 2部構成
  （第1部 LISP編 Phase0-4 → 第2部 VXLAN編 Phase5-8 → 終章考察）を
  観察チェックポイント(📋)と考察(🤔)付きで一緒に進める。
  採点は「軽い最終疎通確認」のみ（得点競争をしない設計・design.md §2.5）。
  ★Phase 4 の PxTR は意図的に「一度失敗させて指紋を読ませる」構成
  （proxy-itr/etr だけでは戻り0% → map-cache <EID空間> map-request で治す。
  `ipv4 map-cache` 形は Invalid の構文罠あり — task.md に注意書き済み）。
  ★NX-OS(LEAF)は RAM 12GB/台・ブート約4.5分。day0 はアンダーレイまで焼き込み済み。
  リソース: 9台・RAM約29GB・リースは .37-.45 を yaml に焼き込み
  （build 時に mgmt_alloc.py gc --apply で台帳へ採用登録）。
