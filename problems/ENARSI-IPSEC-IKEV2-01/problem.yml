---
# IKEv2 サイト間 IPsec VPN 組み立て問題 (sVTI + IPsec Profile + IKEv2, ハブ+2支店)。
# 4ノード: RT01(本社ハブ) / RT02(支店1) / RT03(支店2) / RT04(WANトランジット・変更禁止)。
# underlay は DMVPN-POC-01/PHASE3-01 と完全同一 (将来の DMVPN+IPsec 問題へ流用可能)。
# 学習核心 = IKEv2 のオブジェクト連鎖:
#   proposal(AES-GCM-256/SHA384/DH19) → policy → keyring(ピア毎PSK) → ikev2 profile
#   (match identity/auth/dpd) → ipsec profile(set ikev2-profile) → tunnel protection。
# AEAD(GCM) のため transform-set に整合性アルゴリズム不要、が理解ポイント。
# 支店間通信はハブ経由の2トンネル縦断 (EIGRP)。
id: ENARSI-IPSEC-IKEV2-01
title: "IKEv2 サイト間 IPsec VPN (sVTI + IPsec Profile, ハブ+2支店)"
exam: ENARSI
topics: [ipsec, svti, ikev2, vpn, eigrp, nge]
difficulty: 4
topology: ad-hoc
image_family: iosv
target_nodes: [RT01, RT02, RT03, RT04]
points: 100

# IOSv は network_cli(SSH) 不可 → 採点は CML コンソール経由。
access: console

# Underlay (DMVPN-POC-01 と同一アドレス):
#   RT01 Gi0/0 10.0.14.1/30 -- 10.0.14.2 RT04 Gi0/0
#   RT02 Gi0/0 10.0.24.1/30 -- 10.0.24.2 RT04 Gi0/1
#   RT03 Gi0/0 10.0.34.1/30 -- 10.0.34.2 RT04 Gi0/2
# overlay = sVTI 2本: Tunnel1(HQ-Br1) 10.255.12.0/30 / Tunnel2(HQ-Br2) 10.255.13.0/30
# (支店側はどちらも Tunnel1)。EIGRP AS100。
lab:
  links:
    - { a: RT01, a_if: 0, b: RT04, b_if: 0 }   # HQ underlay
    - { a: RT02, a_if: 0, b: RT04, b_if: 1 }   # Branch1 underlay
    - { a: RT03, a_if: 0, b: RT04, b_if: 2 }   # Branch2 underlay
