---
# ENCOR-EIGRP-01 バリアント "bfd"（base と同値 ＋ BFD 要件）。
# これらを差し替えるだけで変形問題になる（initial と grading.yml.j2 が参照）。
as_number: 100
rt01_lo: 1.1.1.1
rt02_lo: 2.2.2.2
rt03_lo: 3.3.3.3
seg12: 10.1.12        # RT01-RT02 セグメント(/30): .1=RT01 / .2=RT02
seg13: 10.1.13        # RT01-RT03 セグメント(/30): .1=RT01 / .2=RT03

# BFD 要件（conventions.md「BFD 規約」参照）
bfd: true
bfd_interval: 500
bfd_multiplier: 3
