---
# 問題メタデータ
id: ENCOR-IPSLA-01
title: "IP SLA + Track で primary/backup ISP 自動切替（独立Internet・実疎通採点）"
exam: ENCOR
topics: [ip-sla, track, static-route, failover]
difficulty: 4
topology: baseline-8rt
target_nodes: [RT01, RT02, RT03, RT04]
points: 100

# === トポロジ配線 =============================================
# RT01(client) ── RT02 (primary ISP) ──┐
#              ╲  RT03 (backup ISP) ───┤
#                 RT02 ── RT03 (inter-ISP)
#                 RT02 ── RT04 (Internet)   10.0.24.0/30
#                 RT03 ── RT04 (Internet)   10.0.34.0/30
#   8.8.8.8/32 は RT04(Internet) 上。primary/backup 双方の ISP から到達可
#   ＝ どちらの経路に切り替わっても end-to-end で 8.8.8.8 に届く真の冗長構成。
#   各 ISP/Internet ノードは「直結顧客リンク優先＋障害時フローティング」で
#   RT01(Lo0=1.1.1.1) への戻り経路を確保（リンク障害時に自動迂回）。
lab:
  links:
    - { a: RT01, a_if: 0, b: RT02, b_if: 0 }   # 10.0.12.0/30 primary access
    - { a: RT01, a_if: 1, b: RT03, b_if: 0 }   # 10.0.13.0/30 backup access
    - { a: RT02, a_if: 1, b: RT03, b_if: 1 }   # 10.0.23.0/30 inter-ISP
    - { a: RT02, a_if: 2, b: RT04, b_if: 0 }   # 10.0.24.0/30 RT02-Internet
    - { a: RT03, a_if: 2, b: RT04, b_if: 1 }   # 10.0.34.0/30 RT03-Internet
