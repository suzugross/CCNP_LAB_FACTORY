id: FGT-FW-BASIC-01
title: FW 基本設計体験 — ポリシーと NAT で「通る/通らない」を設計する
exam: ENCOR   # FW/NAT/セキュリティ設計の基礎を実機体験で底上げする教材
topics: [firewall-policy, address-object, snat, vip-dnat, implicit-deny, fortigate]
difficulty: 2
topology: FGT-LAB 共用ラボ (poc/fortigate/fgt-lab.yaml)
target_nodes: [fgt1]
fixed_nodes: [ISP1, ISP2, INET, SW2, SW3, pcA, pcB, dmz1, RBR, pcC]   # 据付・変更禁止(共用ラボの他問題機材含む)
points: 100
access: console+gui   # FGT は console と GUI(https://10.1.10.11) 併用
notes: |
  体験型: task.md の Phase 1-5 を観察チェックポイント(📋)と考察課題(🤔)付きで
  段階構築。VIP だけ作って落ちる体験・暗黙 deny の debug flow 目撃が核。
  ★fgt1 は eval ライセンス済み VM — wipe/factoryreset 厳禁(ライセンス消失)。
  ★FGT-SDWAN-01 と CML ラボを共用(FGT-LAB)。build が相互の設定を巻き戻す。
