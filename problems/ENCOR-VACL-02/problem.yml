---
id: ENCOR-VACL-02
title: "VACL で特定ホスト間の通信を遮断 (RTエンドポイント)"
exam: ENCOR
topics: [vacl, acl, l2, security]
difficulty: 4
topology: ad-hoc
target_nodes: [SW01, RT01, RT02, RT03, RT04]
points: 100

# 混在イメージ: VACL対応の iosvl2 スイッチ + 軽量 iol-xe ルータ(エンドポイント)。
# node_image_families でノード単位にイメージを指定(無いノードは下記 image_family 既定)。
image_family: iol
node_image_families:
  SW01: iosv   # VACL は iosvl2 必須
  RT01: iol
  RT02: iol
  RT03: iol
  RT04: iol

# SSH不可スイッチを含むため収集は telnet。
access: telnet

# === トポロジ ================================================
# RT01-04 を SW01 の VLAN10(192.168.10.0/24) にアクセス接続。
# SW01: Gi0/0..0/3 に RT を収容。各RTは Eth0/0 を VLAN10 側に。
lab:
  links:
    - { a: SW01, a_if: 0, b: RT01, b_if: 0 }
    - { a: SW01, a_if: 1, b: RT02, b_if: 0 }
    - { a: SW01, a_if: 2, b: RT03, b_if: 0 }
    - { a: SW01, a_if: 3, b: RT04, b_if: 0 }
