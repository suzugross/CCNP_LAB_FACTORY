---
# RT01 の BGP 設計データ（AS65001）。リソースモジュール準拠のキー名でそのまま渡せる形。
# AS番号は文字列（cisco.ios 11.x は int だと "dictionary requested" エラーになる）。
bgp:
  as_number: "65001"
  router_id: 1.1.1.1
  neighbors:                         # ios_bgp_global 用（グローバルの neighbor 定義）
    - neighbor_address: 10.1.12.2
      remote_as: "65002"
  af_networks:                       # ios_bgp_address_family 用（広告する network）
    - address: 1.1.1.1
      mask: 255.255.255.255
  af_neighbors:                      # address-family ipv4 でのネイバー有効化
    - neighbor_address: 10.1.12.2
      activate: true
