# 穴埋め候補（BGP-01・リソースモジュール）。gen_blanks.py が seed で穴を選ぶ。
# 採点は最終状態のみなので、どこを穴にしても正解は不変。
# 注: router-id用の cisco.ios.ios_config は補助なので穴にしない（候補に含めない）。
default_count: 3      # 4候補から seed で3つを穴にする
blanks:
  - id: module_global
    file: roles/bgp/tasks/main.yml
    find: "cisco.ios.ios_bgp_global"
    blank: "cisco.ios.____"
    answer: "ios_bgp_global"
    hint: "BGPグローバル(AS/neighbor)用リソースモジュール名"

  - id: module_af
    file: roles/bgp/tasks/main.yml
    find: "cisco.ios.ios_bgp_address_family"
    blank: "cisco.ios.____"
    answer: "ios_bgp_address_family"
    hint: "BGP address-family(network/activate)用リソースモジュール名"

  - id: safi
    file: roles/bgp/tasks/main.yml
    find: "safi: unicast"
    blank: "safi: ____"
    answer: "unicast"
    hint: "ユニキャストのsafi名"

  - id: save_when
    file: roles/bgp/handlers/main.yml
    find: "save_when: modified"
    blank: "save_when: ____"
    answer: "modified"
    hint: "running≠startupのとき保存するモード"
