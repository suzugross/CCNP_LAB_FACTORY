---
# ENCOR-INTEGRATED-01 バリアント "base"。実運用エッジ版(NAT/PAT + デフォルト経路 + エッジACL)。
# これらを差し替えるだけで値違いの複合問題になる。
as_internal: 65001     # RT02 の BGP AS（企業エッジ AS）
as_ext: 65100          # RT04 の BGP AS（ISP）
rt01_lo: 1.1.1.1       # RT01 Core（社内）
rt02_lo: 2.2.2.2       # RT02 Edge/ASBR/NAT
rt03_lo: 3.3.3.3       # RT03 内部（社内ホスト想定）
rt04_lo: 4.4.4.4       # RT04 ISP の Loopback＝インターネット上のホスト想定（到達対象）
seg12: 10.0.12         # RT01-RT02 (OSPF): .1=RT01 / .2=RT02
seg13: 10.0.13         # RT01-RT03 (OSPF): .1=RT01 / .2=RT03
seg23: 10.0.23         # RT02-RT03 (OSPF): .1=RT02 / .2=RT03
seg24: 10.0.24         # RT02-RT04 (eBGP/NAT境界): .1=RT02(outside) / .2=RT04
